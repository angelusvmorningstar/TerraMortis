<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terra Mortis -- Downtime Helper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-brand">
    <h1>Downtime Helper</h1>
    <span>Terra Mortis ST Suite</span>
  </div>
  <div id="header-auth" class="header-auth"></div>
</header>

<main>

  <!-- Upload -->
  <section id="upload-section">
    <div id="drop-zone">
      <div class="drop-icon">📋</div>
      <p><strong>Drop your Google Forms CSV export here</strong></p>
      <p>or</p>
      <label class="btn" for="file-input">Browse File</label>
      <input type="file" id="file-input" accept=".csv">
    </div>
    <div id="file-status"></div>
    <div id="parse-error"></div>
    <div style="display:flex;gap:0.75rem;margin-top:1rem;align-items:center;flex-wrap:wrap">
      <button class="btn" id="export-btn"    style="display:none">Export JSON</button>
      <button class="btn" id="publish-btn"   style="display:none">Publish Cycle</button>
      <button class="btn" id="new-cycle-btn" style="display:none">New Cycle</button>
      <button class="btn" id="clear-btn"     style="display:none;border-color:var(--crim);color:var(--crim2)">Clear Database</button>
      <span   id="db-status" style="font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.08em;color:var(--muted)"></span>
    </div>
  </section>

  <!-- Dashboard (hidden until file loaded) -->
  <div id="dashboard">

    <!-- Tab navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="summary">Summary</button>
      <button class="tab-btn" data-tab="territories">Territories</button>
      <button class="tab-btn" data-tab="players">Players</button>
    </nav>

    <!-- ── Summary tab ── -->
    <div id="tab-summary" class="tab-pane active">

      <section>
        <div class="section-title">Overview</div>
        <div class="stat-grid" id="stat-grid"></div>
      </section>

      <section>
        <div class="section-title">Action Breakdown</div>
        <div class="breakdown-grid" id="breakdown-grid"></div>
      </section>

      <section>
        <div class="section-title">Action Search</div>
        <div id="search-section">
          <div style="display:flex;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
            <input id="search-input" type="text" placeholder="Search actions, descriptions, characters..."
              style="flex:1;min-width:200px;background:var(--surf2);border:1px solid var(--border);
                     border-radius:var(--radius);padding:0.5rem 0.75rem;color:var(--text);
                     font-family:'Lora',serif;font-size:0.9rem;outline:none">
            <select id="search-filter"
              style="background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);
                     padding:0.5rem 0.75rem;color:var(--text);font-family:'Cinzel',serif;font-size:0.75rem">
              <option value="all">All action types</option>
              <option value="projects">Projects only</option>
              <option value="sphere">Sphere actions only</option>
              <option value="ambience">Ambience changes</option>
              <option value="patrol">Patrol / Scout</option>
              <option value="contacts">Contacts</option>
            </select>
          </div>
          <div id="search-results"></div>
        </div>
      </section>

    </div>

    <!-- ── Territories tab ── -->
    <div id="tab-territories" class="tab-pane">

      <section>
        <div class="section-title">Ambience Actions by Territory</div>
        <div id="territory-actions-section"></div>
      </section>

      <section>
        <div class="section-title">Feeding &amp; Influence</div>
        <div id="territory-section"></div>
      </section>

    </div>

    <!-- ── Players tab ── -->
    <div id="tab-players" class="tab-pane">
      <div class="player-layout">

        <aside class="player-menu" id="player-menu"></aside>

        <div class="player-detail" id="player-detail">
          <p style="color:var(--muted);font-family:'Cinzel',serif;font-size:0.8rem;
                    letter-spacing:0.06em;padding-top:2rem">
            Select a character from the list.
          </p>
        </div>

      </div>
    </div>

  </div>

</main>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/parser.js"></script>
<script src="js/db.js"></script>
<script src="js/roller.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/main.js"></script>
</body>
</html>
