<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Mortis — ST Admin</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="css/admin-layout.css">
</head>
<body>

<!-- Login screen (shown when not authenticated) -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">Terra Mortis</div>
    <div class="login-sub">ST Admin</div>
    <p class="login-desc">Storyteller access only. Log in with Discord to continue.</p>
    <button id="login-btn" class="login-discord-btn">
      <svg width="20" height="15" viewBox="0 0 71 55" fill="currentColor"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 5a.2.2 0 00-.1 0A60.4 60.4 0 00.3 45.3a.3.3 0 000 .2 58.7 58.7 0 0017.7 9a.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.6 38.6 0 01-5.5-2.6.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 41.9 41.9 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .3 36.3 36.3 0 01-5.5 2.7.2.2 0 00-.1.3 47.2 47.2 0 003.6 5.9.2.2 0 00.3 0A58.5 58.5 0 0070.3 45.5a.2.2 0 000-.2A60 60 0 0060.2 5a.2.2 0 00-.1 0zM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.1 6.4-7.1 6.5 3.2 6.4 7.1c0 3.9-2.8 7.1-6.4 7.1zm23.6 0c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.1 6.4-7.1 6.5 3.2 6.4 7.1c0 3.9-2.8 7.1-6.4 7.1z"/></svg>
      Log in with Discord
    </button>
    <p id="login-error" class="login-error"></p>
  </div>
</div>

<div id="admin-app" style="display:none">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Terra Mortis</div>
      <div class="sidebar-sub">ST Admin</div>
    </div>
    <div class="sidebar-nav">
      <button class="sidebar-btn" data-domain="players">Players</button>
      <button class="sidebar-btn on" data-domain="player">Characters</button>
      <button class="sidebar-btn" data-domain="city">City</button>
      <button class="sidebar-btn" data-domain="downtime">Downtime</button>
      <button class="sidebar-btn" data-domain="attendance">Attendance</button>
      <button class="sidebar-btn" data-domain="engine">Engine</button>
    </div>
    <div class="sidebar-app-nav">
      <a href="/" class="app-nav-btn">Game App</a>
      <a href="/player" class="app-nav-btn">Player</a>
    </div>
    <div class="sidebar-user" id="sidebar-user"></div>
  </nav>

  <!-- Content area -->
  <main id="content">

    <!-- Players domain -->
    <section id="d-players" class="domain">
      <div class="domain-header">
        <h2>Players</h2>
        <span id="players-count" class="domain-count"></span>
      </div>
      <div id="players-content"></div>
    </section>

    <!-- Player domain -->
    <section id="d-player" class="domain active">
      <div class="domain-header">
        <h2>Characters</h2>
        <span id="char-count" class="domain-count"></span>
        <button id="btn-new-char" class="btn-sm" onclick="window.createNewCharacter()">+ New Character</button>
        <button id="btn-csv" class="btn-sm" onclick="window.downloadCSV()">Download CSV</button>
      </div>
      <div id="char-grid" class="char-grid"></div>
      <div id="char-detail" class="char-detail" style="display:none"></div>
    </section>

    <!-- City domain -->
    <section id="d-city" class="domain">
      <div class="domain-header"><h2>City</h2></div>
      <div id="city-content"></div>
    </section>

    <!-- Downtime domain -->
    <section id="d-downtime" class="domain">
      <div class="domain-header"><h2>Downtime</h2></div>
      <div id="downtime-content"></div>
    </section>

    <!-- Attendance domain -->
    <section id="d-attendance" class="domain">
      <div class="domain-header"><h2>Attendance &amp; Finance</h2></div>
      <div id="attendance-content"></div>
    </section>

    <!-- Engine domain -->
    <section id="d-engine" class="domain">
      <div class="domain-header"><h2>Engine</h2></div>
      <div id="engine-content" class="engine-split"></div>
      <div id="session-tracker" style="margin-top:20px;"></div>
    </section>

  </main>

</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
