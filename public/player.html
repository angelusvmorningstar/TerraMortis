<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Mortis — Player Portal</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@400;600;700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/player-layout.css">
<!-- Theme init: dark unless user explicitly saved 'light'. Matches index.html default. -->
<script>
(function(){
  var t=localStorage.getItem('tm-theme');
  if(t !== 'light') document.documentElement.setAttribute('data-theme','dark');
})();
</script>
<!-- Unified app redirect: player.html is now a redirect to the unified game app (index.html).
     All player functionality lives in index.html with role-aware rendering.
     This page is kept for backwards-compatible URLs during transition. -->
<script>
(function(){
  // Preserve any OAuth callback params so auth still completes correctly
  var search = window.location.search;
  var hash = window.location.hash;
  if (search || hash) {
    window.location.replace('/' + search + hash);
  } else {
    window.location.replace('/');
  }
})();
</script>
</head>
<body>

<!-- Login screen (hidden until needed) -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-title">Terra Mortis</div>
    <div class="login-sub">Player Portal</div>
    <p class="login-desc">Log in with Discord to access your characters.</p>
    <button id="login-btn" class="login-discord-btn">
      <svg width="20" height="15" viewBox="0 0 71 55" fill="currentColor"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 5a.2.2 0 00-.1 0A60.4 60.4 0 00.3 45.3a.3.3 0 000 .2 58.7 58.7 0 0017.7 9a.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.6 38.6 0 01-5.5-2.6.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 41.9 41.9 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .3 36.3 36.3 0 01-5.5 2.7.2.2 0 00-.1.3 47.2 47.2 0 003.6 5.9.2.2 0 00.3 0A58.5 58.5 0 0070.3 45.5a.2.2 0 000-.2A60 60 0 0060.2 5a.2.2 0 00-.1 0zM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.1 6.4-7.1 6.5 3.2 6.4 7.1c0 3.9-2.8 7.1-6.4 7.1zm23.6 0c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.1 6.4-7.1 6.5 3.2 6.4 7.1c0 3.9-2.8 7.1-6.4 7.1z"/></svg>
      Log in with Discord
    </button>
    <p id="login-error" class="login-error"></p>
  </div>
</div>

<!-- Player app -->
<div id="player-app" style="display:none">

  <button class="sb-open-btn" id="sb-open" title="Open menu">&#9776;</button>
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Terra Mortis</div>
      <button class="sb-close-btn" id="sb-close" title="Collapse sidebar">&#171;</button>
      <div class="sidebar-sub">Player Portal</div>
      <select id="char-selector" class="char-selector" style="display:none"></select>
    </div>
    <div class="sidebar-nav">
      <button class="sidebar-btn on" data-tab="sheet">Sheet</button>
      <button class="sidebar-btn" data-tab="regency" id="tab-btn-regency" style="display:none">Regency</button>
      <button class="sidebar-btn" data-tab="office" id="tab-btn-office" style="display:none">Office</button>
      <button class="sidebar-btn" data-tab="downtime" id="tab-btn-downtime">Submit DT</button>
      <button class="sidebar-btn" data-tab="feeding" id="tab-btn-feeding">Feeding</button>
      <button class="sidebar-btn" data-tab="xplog">Ordeals &amp; XP</button>
      <button class="sidebar-btn" data-tab="story">Story</button>
      <button class="sidebar-btn" data-tab="archive" id="tab-btn-archive" style="display:none">Archive</button>
      <button class="sidebar-btn" data-tab="city">City</button>
      <button class="sidebar-btn" data-tab="status">Status</button>
      <button class="sidebar-btn" data-tab="primer">Primer</button>
      <button class="sidebar-btn" data-tab="tickets">Tickets</button>
    </div>
    <div class="sidebar-footer-nav" id="sidebar-footer-nav"></div>
    <div class="sidebar-user" id="sidebar-user"></div>
  </nav>

  <!-- Content area -->
  <div id="content">

    <!-- Character creator wizard (shown instead of tabs when no approved chars) -->
    <div id="wizard-container" style="display:none"></div>

    <!-- Pending approval state (shown when char submitted but not yet approved) -->
    <div id="pending-container" style="display:none">
      <div class="pending-msg">
        <div class="pending-title">Character Pending Approval</div>
        <p class="pending-body">Your character has been submitted and is awaiting ST sign-off. You'll be able to access the portal once approved.</p>
      </div>
    </div>

    <!-- Tab panels -->
    <div id="player-body">
      <section id="tab-sheet" class="tab-panel active">
        <div id="sh-content" class="cd-sheet"></div>
      </section>
      <section id="tab-regency" class="tab-panel">
        <div id="regency-content"></div>
      </section>
      <section id="tab-office" class="tab-panel">
        <div id="office-content"></div>
      </section>
      <section id="tab-downtime" class="tab-panel">
      </section>
      <section id="tab-feeding" class="tab-panel">
        <div id="feeding-content"></div>
      </section>
      <section id="tab-xplog" class="tab-panel">
      </section>
      <section id="tab-story" class="tab-panel">
        <div id="story-content"></div>
      </section>
      <section id="tab-archive" class="tab-panel"></section>
      <section id="tab-city" class="tab-panel"></section>
      <section id="tab-status" class="tab-panel"></section>
      <section id="tab-primer" class="tab-panel"></section>
      <section id="tab-tickets" class="tab-panel">
        <div id="tickets-content"></div>
      </section>
    </div>

  </div>

</div>

<script type="module" src="js/player.js"></script>
</body>
</html>
