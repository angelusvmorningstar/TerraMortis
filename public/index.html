<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Terra Mortis</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3A0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@400;600;700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/suite.css">
<!-- Theme init: apply saved preference before body renders to prevent flash -->
<script>
(function(){
  var t=localStorage.getItem('tm-theme');
  if(t !== 'light') document.documentElement.setAttribute('data-theme','dark');
})();
</script>
</head>
<body>

<!-- Login screen (shown before auth) -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-title">Terra Mortis</div>
    <div class="login-subtitle">Game App</div>
    <button id="login-btn" class="login-crim-btn">Login with Discord</button>
    <p id="login-error" class="login-error"></p>
  </div>
</div>

<div id="app" style="display:none">

  <!-- ══ HEADER — compact: logo + character name + pool banner ══ -->
  <div id="hdr">
    <div class="hdr-brand">
      <img class="hdr-icon" src="assets/icon-192.png" alt="Terra Mortis" width="28" height="28">
      <span class="hdr-char-name" id="hdr-char-name"></span>
    </div>
    <div id="pool-banner" style="display:none"></div>
    <!-- Hidden controls: kept in DOM for desktop mode / JS references but not shown on mobile -->
    <div id="hdr-nav" style="display:none">
      <button id="btn-view-toggle" class="app-nav-btn view-toggle-btn" onclick="toggleViewMode()" style="display:none">Player View</button>
      <button id="btn-theme-toggle" class="app-nav-btn theme-toggle-btn" onclick="toggleTheme()"></button>
      <button id="btn-desktop-toggle" class="app-nav-btn desktop-toggle-btn" onclick="toggleDesktopMode()">
        <svg id="desktop-icon-game" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <svg id="desktop-icon-desktop" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </button>
      <a href="/admin" id="nav-admin" class="app-nav-btn" style="display:none">ST Admin</a>
    </div>
  </div>

  <!-- app-body: sidebar + content row (header stays above both) -->
  <div id="app-body">

    <!-- Desktop mode sidebar (hidden in game mode) -->
    <div id="desktop-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Terra Mortis</div>
        <div class="sidebar-sub">Game App</div>
        <div class="sidebar-actions" id="desktop-sidebar-actions"></div>
      </div>
      <div id="desktop-sidebar-nav" class="sidebar-nav"></div>
      <div class="sidebar-user" id="desktop-sidebar-user"></div>
    </div>

  <div class="tab-wrap">

    <!-- ═══ CHARACTERS TAB (Editor list) ═══ -->
    <div id="t-chars" class="tab">
      <div class="list-toolbar">
        <input class="list-search" type="text" placeholder="Search characters..." oninput="filterList()">
        <select class="list-filter" id="filter-clan" onchange="filterList()">
          <option value="">All Clans</option>
          <option>Daeva</option><option>Gangrel</option><option>Mekhet</option><option>Nosferatu</option><option>Ventrue</option>
        </select>
        <select class="list-filter" id="filter-cov" onchange="filterList()">
          <option value="">All Covenants</option>
          <option>Carthian Movement</option><option>Circle of the Crone</option><option>Invictus</option><option>Lancea et Sanctum</option><option>Ordo Dracul</option>
        </select>
        <span class="list-count" id="list-count"></span>
      </div>
      <div class="char-grid" id="char-grid"></div>
    </div>

    <!-- ═══ EDITOR SHEET TAB ═══ -->
    <div id="t-editor" class="tab">
      <div class="sheet-topbar">
        <div class="svt-toggle">
          <button class="svt-btn on" id="svt-sheet" onclick="setSheetView('sheet')">Sheet</button>
          <button class="svt-btn" id="svt-dt" onclick="setSheetView('dt')">DT Report</button>
        </div>
        <button class="sheet-edit-btn" onclick="openRulesOverlay()">Rules</button>
        <button class="sheet-edit-btn" id="btn-print" onclick="printPDF()">PDF</button>
        <button class="sheet-edit-btn" id="btn-export-json" onclick="exportJSON()">JSON</button>
      </div>
      <div id="gcp-panel"></div>
      <div id="sh-content"></div>
      <div id="dt-lookup" style="display:none"></div>
    </div>

    <!-- ═══ EDITOR EDIT TAB ═══ -->
    <div id="t-edit" class="tab">
      <div class="edit-header">
        <button class="edit-back" onclick="goTab('chars')" title="Back to list">&larr;</button>
        <img class="edit-icon" id="edit-clan-icon" alt="" style="display:none">
        <span class="edit-charname" id="edit-charname">No character selected</span>
        <div class="edit-tabs">
          <button class="edit-tab on" onclick="showEditTab('identity')" data-tab="identity">Identity</button>
          <button class="edit-tab" onclick="showEditTab('attrs')" data-tab="attrs">Attributes &amp; Skills</button>
        </div>
        <span class="edit-dirty" id="edit-dirty">UNSAVED</span>
      </div>
      <div class="edit-body" id="edit-body">
        <div class="etab active" id="et-identity"></div>
        <div class="etab" id="et-attrs"></div>
      </div>
    </div>

    <!-- ═══ ROLL TAB ═══ -->
    <div id="t-dice" class="tab">
      <div id="lifecycle-cards" style="display:none"></div>
      <div class="shortcut-row">
        <button class="sc-btn" id="sc-char" onclick="openPanel('char')">
          <span class="sc-label" id="sc-char-lbl">Character</span>
          <span class="sc-val" id="sc-char-val"></span>
        </button>
        <button class="sc-btn" id="sc-disc" onclick="openPanel('disc')">
          <span class="sc-label" id="sc-disc-lbl">Discipline</span>
          <span class="sc-val" id="sc-disc-val"></span>
        </button>
        <button class="sc-btn" id="sc-common" onclick="openPanel('common')">
          <span class="sc-label">Common</span>
        </button>
        <button class="sc-btn sc-btn-auspex" id="sc-auspex" onclick="openPanel('auspex')" style="display:none">
          <span class="sc-label">Auspex</span>
        </button>
      </div>
      <div id="roll-char-pools" style="display:none"></div>
      <div>
        <div class="slabel">Dice pool</div>
        <div class="crow">
          <button class="cbtn" onclick="chgPool(-1)">&minus;</button>
          <div class="cval" id="pval">5</div>
          <button class="cbtn" onclick="chgPool(1)">+</button>
        </div>
        <div class="effline" id="effline">Effective pool: <span>5 dice</span></div>
      </div>
      <div>
        <div class="slabel">Bonus / Penalty</div>
        <div class="crow">
          <button class="bbtn" onclick="chgMod(-1)">&minus;</button>
          <div class="bval" id="mval">0</div>
          <button class="bbtn" onclick="chgMod(1)">+</button>
        </div>
      </div>
      <div id="resist-sec" style="display:none;">
        <div class="slabel" id="resist-lbl">Resistance</div>
        <select id="resist-sel" class="resist-sel" onchange="updResist()">
          <option value="">&#8212; select target &#8212;</option>
        </select>
        <div id="resist-line" class="resist-line"></div>
      </div>
      <div>
        <div class="slabel">Again rule</div>
        <div class="arow">
          <button class="abtn" id="a8" onclick="setAgain(8)">8-AGAIN</button>
          <button class="abtn" id="a9" onclick="setAgain(9)">9-AGAIN</button>
        </div>
      </div>
      <div class="mrow">
        <button class="mchip" id="rote-c" onclick="togMod('rote')">Rote</button>
        <button class="mchip" id="na-c" onclick="togMod('na')">No Again</button>
        <button class="mchip wp-chip" id="wp-c" onclick="togMod('wp')">WP (+3)</button>
      </div>
      <button id="roll-btn" onclick="doRoll()">Roll the Dice</button>
      <button id="btn-contested" onclick="openContestedRoll()" style="display:none">Contested Roll</button>
      <div id="res-area">
        <div id="res-hdr"></div>
        <div id="dice-area"><div class="empty-d">No rolls yet</div></div>
      </div>
      <div>
        <div class="hist-hdr">
          <div class="slabel slabel-inline">History</div>
          <button class="hist-clr" onclick="clrHist()">Clear</button>
        </div>
        <div class="hlist" id="hlist"><div class="hempty">No rolls yet</div></div>
      </div>
      <!-- Feeding moved to More grid → Feeding app (nav-2-5) -->
    </div>

    <!-- ═══ TERRITORY TAB ═══ -->
    <div id="t-territory" class="tab">
      <div id="terr-root"></div>
    </div>

    <!-- ═══ SHEETS TAB (ST opens a character sheet) ═══ -->
    <div id="t-sheets" class="tab">
      <div id="sh-empty" class="dtl-empty">No character selected</div>
      <div id="sh-content-suite" style="display:none"></div>
    </div>

    <!-- ═══ TRACKER TAB ═══ -->
    <div id="t-tracker" class="tab"></div>

    <!-- ═══ RULES TAB ═══ -->
    <div id="t-rules" class="tab"></div>

    <!-- ═══ STATUS TAB ═══ -->
    <div id="t-status" class="tab"></div>

    <!-- ═══ SIGN-IN TAB (ST only) ═══ -->
    <div id="t-signin" class="tab"></div>

    <!-- ═══ MORE TAB — app grid launcher (Story 1.3) ═══ -->
    <div id="t-more" class="tab"></div>

    <!-- ═══ MORE GRID APP CONTAINERS (Story 1.3) — content wired in Epic 2 ═══ -->
    <div id="t-map" class="tab"></div>
    <div id="t-whos-who" class="tab"></div>
    <div id="t-downtime" class="tab"></div>
    <div id="t-feeding" class="tab"></div>
    <div id="t-primer" class="tab"></div>
    <div id="t-game-guide" class="tab"></div>
    <div id="t-ordeals" class="tab"></div>
    <div id="t-tickets" class="tab"></div>
    <div id="t-emergency" class="tab"></div>
    <div id="t-combat" class="tab"></div>
    <div id="t-regency" class="tab"></div>
    <div id="t-office" class="tab"></div>
    <div id="t-stats" class="tab active"><div id="stats-content"></div></div>
    <div id="t-skills" class="tab"><div id="skills-content"></div></div>
    <div id="t-powers" class="tab"><div id="powers-content"></div></div>
    <div id="t-info" class="tab"><div id="info-content"></div></div>
    <div id="t-archive" class="tab"></div>
    <div id="t-settings" class="tab"></div>

  </div><!-- /tab-wrap -->

  </div><!-- /app-body -->

  <!-- ═══ BOTTOM NAV — Scrollable swipeable strip ═══ -->
  <nav id="bnav"></nav>
</div>

<!-- PICKER PANEL -->
<div id="panel-overlay" onclick="overlayClick(event)">
  <div id="panel">
    <div class="panel-hdr">
      <span class="panel-title" id="panel-title">Select</span>
      <button class="panel-close" onclick="closePanel()">&#10005; Close</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<!-- Contested Roll Overlay -->
<div id="cr-overlay" style="display:none">
  <div id="cr-box" class="cr-box"></div>
</div>

<div id="toast"></div>

<script type="module" src="js/app.js?v=20260420e"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
