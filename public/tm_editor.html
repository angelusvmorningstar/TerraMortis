<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Mortis — Character Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/editor.css">
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div id="topbar">
  <img class="topbar-logo" id="topbar-logo" alt="">
  <div class="topbar-title">Character Editor</div>
  <div class="topbar-nav">
    <button class="topbar-btn on" onclick="showView('list')" id="nav-list">Characters</button>
    <button class="topbar-btn" onclick="showView('sheet')" id="nav-sheet">Sheet</button>
    <button class="topbar-btn" onclick="showView('edit')" id="nav-edit">Edit</button>
    <button class="topbar-btn" onclick="showView('export')" id="nav-export">Export</button>
  </div>
  <div class="topbar-right">
    <button class="topbar-action green" onclick="syncToSuite()" title="Write tm_chars_db to tm_import_chars for ST Suite">Sync to Suite</button>
    <button class="topbar-action" onclick="saveAll()" id="btn-save">Save All</button>
  </div>
</div>

<!-- ══ VIEWS ══ -->
<div id="app">

  <!-- LIST VIEW -->
  <div class="view active" id="v-list">
    <div class="list-toolbar">
      <input class="list-search" type="text" placeholder="Search characters..." oninput="filterList()">
      <select class="list-filter" id="filter-clan" onchange="filterList()">
        <option value="">All Clans</option>
        <option>Daeva</option><option>Gangrel</option><option>Mekhet</option><option>Nosferatu</option><option>Ventrue</option>
      </select>
      <select class="list-filter" id="filter-cov" onchange="filterList()">
        <option value="">All Covenants</option>
        <option>Carthian Movement</option><option>Circle of the Crone</option><option>Invictus</option><option>Lancea et Sanctum</option>
      </select>
      <span class="list-count" id="list-count"></span>
    </div>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <!-- EDIT VIEW -->
  <div class="view" id="v-edit">
    <div class="edit-header">
      <button class="edit-back" onclick="showView('list')" title="Back to list">&larr;</button>
      <img class="edit-icon" id="edit-clan-icon" alt="" style="display:none">
      <span class="edit-charname" id="edit-charname">No character selected</span>
      <div class="edit-tabs">
        <button class="edit-tab on" onclick="showEditTab('identity')" data-tab="identity">Identity</button>
        <button class="edit-tab" onclick="showEditTab('attrs')" data-tab="attrs">Attributes &amp; Skills</button>
      </div>
      <span class="edit-dirty" id="edit-dirty">UNSAVED</span>
    </div>
    <div class="edit-body" id="edit-body">
      <!-- Identity tab -->
      <div class="etab active" id="et-identity"></div>
      <!-- Attributes & Skills tab -->
      <div class="etab" id="et-attrs"></div>
    </div>
  </div>

  
  <!-- SHEET VIEW -->
  <div class="view" id="v-sheet">
    <div class="sheet-topbar">
      <button onclick="showView('list')">&larr; Back</button>
      <button class="sheet-edit-btn" onclick="editFromSheet()">Edit</button>
    </div>
    <div id="sh-content"></div>
  </div>

  <!-- EXPORT VIEW -->
  <div class="view" id="v-export">
    <div class="export-section">
      <div class="form-section-title">Export &amp; Sync</div>
      <p class="export-desc">
        Export all character data as a CSV matching the 365-column Data Merge schema for Affinity Publisher,
        or sync to the ST Suite's localStorage for immediate use.
      </p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="topbar-action" onclick="downloadCSV()">Download CSV</button>
        <button class="topbar-action green" onclick="syncToSuite()">Sync to ST Suite</button>
      </div>
      <p class="export-desc" style="margin-top:24px;font-size:12px;color:var(--txt3);">
        CSV export is not yet implemented. Sync writes <code>tm_chars_db</code> &rarr; <code>tm_import_chars</code>.
      </p>
    </div>
  </div>
</div>

const SORCERY_THEMES = ['Creation','Destruction','Divination','Protection','Transmutation'];

function shDots(n){ return '●'.repeat(Math.max(0,n||0)); }
function meritBdRow(realIdx, mc){
  const total=(mc.cp||0)+(mc.free||0)+(mc.xp||0);
  const up=mc.up||0;
  return '<div class="merit-bd-row">'
    +'<span class="bd-lbl">CP</span><input class="merit-bd-input" type="number" min="0" value="'+(mc.cp||0)+'" onchange="shEditMeritPt('+realIdx+',\'cp\',+this.value)">'
    +'<span class="bd-lbl">Fr</span><input class="merit-bd-input" type="number" min="0" value="'+(mc.free||0)+'" onchange="shEditMeritPt('+realIdx+',\'free\',+this.value)">'
    +'<span class="bd-lbl">XP</span><input class="merit-bd-input" type="number" min="0" value="'+(mc.xp||0)+'" onchange="shEditMeritPt('+realIdx+',\'xp\',+this.value)">'
    +'<span class="bd-lbl'+(up?' bd-up':'')+'">UP</span><input class="merit-bd-input'+(up?' bd-up-input':'')+'" type="number" min="0" value="'+up+'" onchange="shEditMeritPt('+realIdx+',\'up\',+this.value)">'
    +'<span class="bd-total">= '+total+' dot'+(total===1?'':'s')+(up?' <span class="bd-up-warn">+'+up+' unaccounted</span>':'')+'</span>'
    +'</div>';
}
function shDotsWithBonus(base,bonus){
  if(!bonus) return shDots(base);
  return '●'.repeat(base)+'○'.repeat(bonus);
}

function powersForDisc(powers, discName){
  if(!powers) return [];
  if(SORCERY_THEMES.includes(discName)){
    return powers.filter(p=>p.name && p.name.includes('| '+discName));
  }
  if(RITUAL_DISCS.includes(discName)){
    return powers.filter(p=>p.name && (p.name.startsWith(discName) || p.name.includes('| '+discName)));
  }
  return powers.filter(p=>{
    if(!p.name) return false;
    const n=p.name.split('|')[0].trim().split(/\s+/);
    return n[0]===discName || (n.length>1 && n.slice(0,-1).join(' ')===discName);
  });
}
function otherPowers(c){
  const allSorcery=[...SORCERY_THEMES,...RITUAL_DISCS];
  const discNames=Object.keys(c.disciplines||{});
  return (c.powers||[]).filter(p=>{
    if(!p.name) return false;
    const key=p.name.split('|')[0].trim().replace(/\s*[●○]+$/,'').replace(/\s+\d+$/,'');
    if(SORCERY_THEMES.includes(key.split(' ').pop())) return false;
    if(allSorcery.some(d=>p.name.startsWith(d))) return false;
    return !discNames.some(d=>key===d||key.startsWith(d+' '));
  });
}

function meritBase(s){ return s.replace(/\s*[●○]+.*/,'').replace(/\s*\|.*/,'').trim(); }
function meritDotCount(s){ return (s.match(/●/g)||[]).length; }
function meritSuffix(s){ const m=s.match(/\|\s*(.+)$/); return m?m[1].trim():null; }
function meritKey(s){ return meritBase(s).toLowerCase(); }
function meritKeyBase(s){ return meritKey(s).replace(/\s*\([^)]*\)\s*/g,'').trim(); }
function meritLookup(s){
  const k=meritKey(s);
  if(MERITS_DB[k]) return MERITS_DB[k];
  const kb=meritKeyBase(s);
  if(MERITS_DB[kb]) return MERITS_DB[kb];
  return null;
}

// ── Centralised merit array helpers ──
function meritByCategory(c, category, filteredIdx){
  const filtered=(c.merits||[]).filter(m=>m.category===category);
  const m=filtered[filteredIdx];
  if(!m) return {merit:null, realIdx:-1};
  return {merit:m, realIdx:c.merits.indexOf(m)};
}
function ensureMeritSync(c){
  if(!c.merits) c.merits=[];
  if(!c.merit_creation) c.merit_creation=[];
  while(c.merit_creation.length<c.merits.length) c.merit_creation.push({cp:0,free:0,xp:0});
  if(c.merit_creation.length>c.merits.length) c.merit_creation.length=c.merits.length;
}
function addMerit(c, merit){
  if(!c.merits) c.merits=[];
  c.merits.push(merit);
  ensureMeritSync(c);
}
function removeMerit(c, realIdx){
  if(realIdx<0||realIdx>=c.merits.length) return;
  c.merits.splice(realIdx,1);
  if(c.merit_creation&&realIdx<c.merit_creation.length) c.merit_creation.splice(realIdx,1);
}

let openExpId=null;
function toggleExp(id){
  const row=document.getElementById('exp-row-'+id);
  const body=document.getElementById('exp-body-'+id);
  if(!row||!body) return;
  if(openExpId && openExpId!==id){
    const pr=document.getElementById('exp-row-'+openExpId);
    const pb=document.getElementById('exp-body-'+openExpId);
    if(pr) pr.classList.remove('open');
    if(pb) pb.classList.remove('visible');
  }
  const isOpen=body.classList.contains('visible');
  row.classList.toggle('open',!isOpen);
  body.classList.toggle('visible',!isOpen);
  openExpId=isOpen?null:id;
}
function toggleDisc(id){
  const row=document.getElementById('disc-row-'+id);
  const drawer=document.getElementById('disc-drawer-'+id);
  if(!row||!drawer) return;
  const isOpen=drawer.classList.contains('visible');
  row.classList.toggle('open',!isOpen);
  drawer.classList.toggle('visible',!isOpen);
}

function expRow(id, lbl, val, bodyHtml){
  return '<div class="exp-row" id="exp-row-'+id+'" onclick="toggleExp(\''+id+'\')">'
    +'<span class="exp-lbl labeled">'+lbl+'</span>'
    +'<span class="exp-val">'+(val||'')+'</span>'
    +'<span class="exp-arr">›</span></div>'
    +'<div class="exp-body" id="exp-body-'+id+'">'+bodyHtml+'</div>';
}

// ── Derived merit system ──
function applyDerivedMerits(c){
  if(!c) return;
  // Strip any previously derived merits (reverse iterate for safe splicing)
  if(c.merits){
    for(let i=c.merits.length-1;i>=0;i--){
      if(c.merits[i].derived) removeMerit(c,i);
    }
  }
  // MCI grants
  const mci=(c.merits||[]).find(m=>m.name==='Mystery Cult Initiation');
  if(mci&&mci.active!==false&&mci.benefit_grants){
    const dots=mci.rating||0;
    for(let d=0;d<Math.min(dots,mci.benefit_grants.length);d++){
      const grant=mci.benefit_grants[d];
      if(!grant||!grant.name) continue;
      // Check prereqs from MERITS_DB
      const dbEntry=MERITS_DB[grant.name.toLowerCase()];
      if(dbEntry&&dbEntry.prereq&&!meritQualifies(c,dbEntry.prereq)){
        // Grant fails prereq check — inject as flagged invalid
        addMerit(c,Object.assign({},grant,{derived:true,granted_by:'MCI L'+(d+1),prereq_failed:true}));
      } else {
        addMerit(c,Object.assign({},grant,{derived:true,granted_by:'MCI L'+(d+1)}));
      }
    }
  }
}

      const budget=PRI_BUDGETS[curPri]||5;
      const catAttrs=ATTR_CATS[cat]||[];
      const usedCP=catAttrs.reduce((s,a)=>s+(((c.attr_creation||{})[a]||{}).cp||0), 0);
      const remaining=budget-usedCP;
      const opts=PRI_LABELS.map(p=>'<option'+(curPri===p?' selected':'')+'>'+p+'</option>').join('');
      h+='<div class="sh-attr-pri"><select onchange="shSetPriority(\''+cat+'\',this.value)">'+opts+'</select>'
        +'<span class="sh-cp-remaining'+(remaining<0?' over':remaining===0?' full':'')+'">'+remaining+' CP</span></div>';
    });
    h+='</div>';
  }
  const BONUS_SOURCE={Strength:'Vigour',Stamina:'Resilience'};
  function attrCat(a){
    if(ATTR_CATS.Mental.includes(a)) return 'Mental';
    if(ATTR_CATS.Physical.includes(a)) return 'Physical';
    return 'Social';
  }
  h+='<div class="sh-attr-grid">';
  ATTR_ROWS.forEach(row=>row.forEach((a,ci)=>{
    const base=getAttrVal(c,a), bonus=getAttrBonus(c,a);
    const isClanAttr=c.clan_attribute===a;
    if(editMode) h+='<div>';
    h+='<div class="attr-cell'+(editMode?' attr-cell-edit':'')+'"><div class="attr-name-sh">'+a+(editMode&&isClanAttr?'<span class="attr-clan-star">\u2605</span>':'')+'</div><div class="attr-dots-sh">'+shDotsWithBonus(base,bonus)+'</div></div>';
    if(editMode){
      const cr=(c.attr_creation||{})[a]||{cp:0,free:0,xp:0};
      const aEsc=a.replace(/'/g,"\\'");
      const attrBase=(cr.cp||0)+(cr.free||0);
      const attrXpDots=xpToDots(cr.xp||0,attrBase,4);
      const attrTotal=attrBase+attrXpDots;
      h+='<div class="attr-bd-panel"><div class="attr-bd-row">'
        +'<div class="bd-grp"><span class="bd-lbl">CP</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.cp||0)+'" onchange="shEditAttrPt(\''+aEsc+'\',\'cp\',+this.value)"></div>'
        +'<div class="bd-grp"><span class="bd-lbl">Fr</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.free||0)+'" onchange="shEditAttrPt(\''+aEsc+'\',\'free\',+this.value)"></div>'
        +'<div class="bd-grp"><span class="bd-lbl">XP</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.xp||0)+'" onchange="shEditAttrPt(\''+aEsc+'\',\'xp\',+this.value)"></div>'
        +'<div class="bd-eq"><span class="bd-val">'+attrTotal+'</span></div>'
        +'</div>';
      if(bonus>0){
        const src=BONUS_SOURCE[a]||'';
        h+='<div class="attr-derived-row">'
          +'<span class="bd-src">+'+bonus+'</span>'
          +(src?'<span class="bd-src-lbl">('+src+')</span>':'')
          +'<div class="bd-eff"><span class="bd-lbl">Eff</span> <span class="bd-val">'+(attrTotal+bonus)+'</span></div>'
          +'</div>';
      }
      h+='</div></div>';
    }
  }));
  h+='</div></div>';
  return h;
}

function shRenderSkills(c,editMode){
  let h='';
  // Skills
  const SKILL_COLS=[SKILLS_MENTAL,SKILLS_PHYSICAL,SKILLS_SOCIAL];
  const skillCatOrder=['Mental','Physical','Social'];
  h+='<div class="sh-sec"><div class="sh-sec-title">Skills</div>';
  if(editMode){
    const sPri=c.skill_priorities||{};
    h+='<div class="sh-attr-col-hdr">';
    skillCatOrder.forEach(cat=>{
      const curPri=sPri[cat]||'Primary';
      const budget=SKILL_PRI_BUDGETS[curPri]||11;
      const catSkills=SKILL_CATS[cat]||[];
      const usedCP=catSkills.reduce((s,sk)=>s+(((c.skill_creation||{})[sk]||{}).cp||0), 0);
      const remaining=budget-usedCP;
      const opts=PRI_LABELS.map(p=>'<option'+(curPri===p?' selected':'')+'>'+p+'</option>').join('');
      h+='<div class="sh-attr-pri"><select onchange="shSetSkillPriority(\''+cat+'\',this.value)">'+opts+'</select>'
        +'<span class="sh-cp-remaining'+(remaining<0?' over':remaining===0?' full':'')+'">'+remaining+' CP</span></div>';
    });
    h+='</div>';
    // Spec counter
    const totalSpecs=Object.values(c.skills||{}).reduce((s,sk)=>s+((sk&&sk.specs)?sk.specs.length:0),0);
    const ptMerit=(c.merits||[]).find(m=>m.name==='Professional Training');
    const ptBonus=(ptMerit&&ptMerit.rating>=2)?2:0;
    const freeSpecs=3+ptBonus;
    const specClass=totalSpecs>freeSpecs?'sc-over':totalSpecs===freeSpecs?'sc-full':'sc-val';
    h+='<div class="sh-spec-counter">Specialisations <span class="'+specClass+'">'+totalSpecs+' / '+freeSpecs+' free</span>'
      +(ptBonus?' <span style="font-size:8px;color:var(--txt3)">(incl. '+ptBonus+' from Prof. Training)</span>':'')
      +'</div>';
  }
  h+='<div class="skills-3col">';
  if(editMode){
    SKILL_COLS.forEach((col,colIdx)=>{
      h+='<div>';
      col.forEach(s=>{
        const sk=getSkillObj(c,s);
        const d=sk.dots, bn=sk.bonus, sp=(sk.specs||[]).join(', '), na=sk.nine_again;
        const hasDots=d>0||bn>0;
        const dotStr=hasDots?shDotsWithBonus(d,bn):'\u2013';
        h+='<div class="sh-skill-row sk-edit'+(hasDots?' has-dots':'')+'"><div class="skill-name-wrap"><span class="sh-skill-name">'+s+'</span>'
          +(sp?'<span class="sh-skill-spec">'+formatSpecs(c,sk.specs)+'</span>':'')
          +'</div><div class="skill-dots-wrap"><span class="'+(hasDots?'sh-skill-dots':'sh-skill-zero')+'">'+dotStr+'</span>'
          +(na?'<span class="sh-skill-na">9-Again</span>':'')
          +'</div></div>';
        const cr=(c.skill_creation||{})[s]||{cp:0,free:0,xp:0};
        const sEsc=s.replace(/'/g,"\\'");
        const skBase=(cr.cp||0)+(cr.free||0);
        const skXpDots=xpToDots(cr.xp||0,skBase,2);
        const skTotal=skBase+skXpDots;
        h+='<div class="sk-bd-panel"><div class="sk-bd-row">'
          +'<div class="bd-grp"><span class="bd-lbl">CP</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.cp||0)+'" onchange="shEditSkillPt(\''+sEsc+'\',\'cp\',+this.value)"></div>'
          +'<div class="bd-grp"><span class="bd-lbl">Fr</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.free||0)+'" onchange="shEditSkillPt(\''+sEsc+'\',\'free\',+this.value)"></div>'
          +'<div class="bd-grp"><span class="bd-lbl">XP</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.xp||0)+'" onchange="shEditSkillPt(\''+sEsc+'\',\'xp\',+this.value)"></div>'
          +'<div class="bd-eq"><span class="bd-val">'+skTotal+'</span></div>'
          +'</div>';
        // Specialisations
        const specs=sk.specs||[];
        h+='<div class="sk-spec-list">';
        specs.forEach((sp2,si)=>{
          const isEnhanced=hasAoE(c,sp2);
          h+='<div class="sk-spec-row">'
            +'<input class="sk-spec-input" value="'+esc(sp2)+'" onchange="shEditSpec(\''+sEsc+'\','+si+',this.value)" placeholder="Specialisation">'
            +(isEnhanced?'<span style="color:rgba(140,200,140,.8);font-size:8px;font-family:var(--fh);white-space:nowrap">+2</span>':'')
            +'<button class="sk-spec-rm" onclick="shRemoveSpec(\''+sEsc+'\','+si+')" title="Remove">&times;</button>'
            +'</div>';
        });
        h+='<button class="sk-spec-add" onclick="shAddSpec(\''+sEsc+'\')">+ spec</button>';
        h+='</div></div>';
      });
      h+='</div>';
    });
  } else {
    for(let ri=0;ri<8;ri++){
      SKILL_COLS.forEach(col=>{
        const s=col[ri];
        const sk=getSkillObj(c,s);
        const d=sk.dots, bn=sk.bonus, sp=(sk.specs||[]).join(', '), na=sk.nine_again;
        const hasDots=d>0||bn>0;
        const dotStr=hasDots?shDotsWithBonus(d,bn):'\u2013';
        h+='<div class="sh-skill-row'+(hasDots?' has-dots':'')+'"><div class="skill-name-wrap"><span class="sh-skill-name">'+s+'</span>'
          +(sp?'<span class="sh-skill-spec">'+formatSpecs(c,sk.specs)+'</span>':'')
          +'</div><div class="skill-dots-wrap"><span class="'+(hasDots?'sh-skill-dots':'sh-skill-zero')+'">'+dotStr+'</span>'
          +(na?'<span class="sh-skill-na">9-Again</span>':'')
          +'</div></div>';
      });
    }
  }
  h+='</div></div>';
  return h;
}

function shRenderDisciplines(c,editMode){
  let h='';
  // Disciplines
  function renderDiscRow(d, r, nameStyle){
    const discPowers=(c.powers||[]).filter(p=>p.category==='discipline'&&p.discipline===d);
    const hasPowers=discPowers.length>0;
    const id='disc-'+c.name.replace(/[^a-z]/gi,'')+d.replace(/[^a-z]/gi,'');
    let dr='';
    discPowers.forEach(p=>{
      const pname=p.name;
      dr+='<div class="disc-power"><div class="disc-power-name">'+esc(pname)+'</div>'
        +(p.stats?'<div class="disc-power-stats">'+esc(p.stats)+'</div>':'')
        +'<div class="disc-power-effect">'+esc(p.effect||'')+'</div></div>';
    });
    const nameTag=(nameStyle?'<span class="disc-tap-name" style="'+nameStyle+'">':'<span class="disc-tap-name">')+esc(d)+'</span>';
    const dotsTag=r?'<span class="disc-tap-dots">'+shDots(r)+'</span>':'';
    if(!hasPowers) return '<div class="disc-tap-row"><div class="disc-tap-left">'+nameTag+dotsTag+'</div></div>';
    return '<div class="disc-tap-row" id="disc-row-'+id+'" onclick="toggleDisc(\''+id+'\')">'
      +'<div class="disc-tap-left">'+nameTag+dotsTag+'</div><span class="disc-tap-arr">›</span></div>'
      +'<div class="disc-drawer" id="disc-drawer-'+id+'">'+dr+'</div>';
  }
  function renderDiscEditRow(d, r, isInClan, style){
    const cr=(c.disc_creation||{})[d]||{cp:0,free:0,xp:0};
    const dEsc=d.replace(/'/g,"\\'");
    const costMult=isInClan?3:4;
    const discBase=(cr.cp||0)+(cr.free||0);
    const discXpDots=xpToDots(cr.xp||0,discBase,costMult);
    const discTotal=discBase+discXpDots;
    const nameStyle=style?'style="'+style+'"':'';
    let h2='<div class="disc-tap-row disc-edit"><div class="disc-tap-left"><span class="disc-tap-name" '+nameStyle+'>'+esc(d)+'</span>'
      +(isInClan?'<span class="disc-clan-tag">in-clan</span>':'');
    if(r>0) h2+='<span class="disc-tap-dots">'+shDots(r)+'</span>';
    h2+='</div></div>';
    h2+='<div class="disc-bd-panel"><div class="disc-bd-row">'
      +'<div class="bd-grp"><span class="bd-lbl">CP</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.cp||0)+'" onchange="shEditDiscPt(\''+dEsc+'\',\'cp\',+this.value)"></div>'
      +'<div class="bd-grp"><span class="bd-lbl">Fr</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.free||0)+'" onchange="shEditDiscPt(\''+dEsc+'\',\'free\',+this.value)"></div>'
      +'<div class="bd-grp"><span class="bd-lbl">XP</span> <input class="attr-bd-input" type="number" min="0" value="'+(cr.xp||0)+'" onchange="shEditDiscPt(\''+dEsc+'\',\'xp\',+this.value)"></div>'
      +'<div class="bd-eq"><span class="bd-val">'+discTotal+'</span></div>'
      +'</div></div>';
    return h2;
  }

  if(editMode){
    const clanD=CLAN_DISCS[c.clan]||[];
    const blD=BLOODLINE_DISCS[c.bloodline]||null;
    const inClanList=blD||clanD;
    const dc=c.disc_creation||{};
    const inClanCP=Object.entries(dc).filter(([d])=>inClanList.includes(d)).reduce((s,[,v])=>s+(v.cp||0),0);
    const outClanCP=Object.entries(dc).filter(([d])=>!inClanList.includes(d)).reduce((s,[,v])=>s+(v.cp||0),0);
    const totalCP=inClanCP+outClanCP;
    const remaining=3-totalCP;
    const inOk=inClanCP>=2;

    h+='<div class="sh-sec"><div class="sh-sec-title">Disciplines</div>';
    h+='<div class="disc-cp-counter">'
      +'<span class="sh-cp-remaining'+(remaining<0?' over':remaining===0?' full':'')+'">'+remaining+' CP</span>'
      +'<span style="color:'+(inOk?'rgba(140,200,140,.8)':'rgba(200,80,80,.9)')+'">In-clan: '+inClanCP+' (min 2)</span>'
      +'<span>Out-of-clan: '+outClanCP+' (max 1)</span>'
      +'</div>';
    h+='<div class="disc-list">';
    CORE_DISCS.forEach(d=>{
      const r=(c.disciplines||{})[d]||0;
      const isInClan=inClanList.includes(d);
      h+=renderDiscEditRow(d,r,isInClan,null);
    });
    h+='</div></div>';

    // Blood Sorcery in edit mode
    const covName=(c.covenant||'').toLowerCase();
    const showCruac=covName.includes('crone')||(c.disciplines||{}).Cruac>0;
    const showTheban=covName.includes('lancea')||(c.disciplines||{}).Theban>0;
    if(showCruac||showTheban){
      h+='<div class="sh-sec"><div class="sh-sec-title">Blood Sorcery</div><div class="disc-list">';
      if(showCruac) h+=renderDiscEditRow('Cruac',(c.disciplines||{}).Cruac||0,false,'color:rgba(220,160,120,.9)');
      if(showTheban) h+=renderDiscEditRow('Theban',(c.disciplines||{}).Theban||0,false,'color:rgba(220,160,120,.9)');
      h+='</div></div>';
    }

    // Themes (display only, no CP/XP)
    const themeDiscs=Object.entries(c.disciplines||{}).filter(([d])=>SORCERY_THEMES.includes(d));
    if(themeDiscs.length){
      h+='<div class="sh-sec"><div class="sh-sec-title">Sorcery Themes</div><div class="disc-list">';
      themeDiscs.forEach(([d,r])=>{ h+=renderDiscRow(d,r,'color:rgba(220,160,120,.75)'); });
      h+='</div></div>';
    }
  } else if(c.disciplines&&Object.keys(c.disciplines).length){
    const discEntries=Object.entries(c.disciplines);
    const coreDiscs=discEntries.filter(([d])=>CORE_DISCS.includes(d));
    const ritualDiscs=discEntries.filter(([d])=>RITUAL_DISCS.includes(d));
    const themeDiscs=discEntries.filter(([d])=>SORCERY_THEMES.includes(d));

    if(coreDiscs.length){
      h+='<div class="sh-sec"><div class="sh-sec-title">Disciplines</div><div class="disc-list">';
      coreDiscs.forEach(([d,r])=>{ h+=renderDiscRow(d,r,null); });
      h+='</div></div>';
    }

    if(ritualDiscs.length||themeDiscs.length){
      h+='<div class="sh-sec"><div class="sh-sec-title">Blood Sorcery</div><div class="disc-list">';
      ritualDiscs.forEach(([d,r])=>{
        h+=renderDiscRow(d,r,'color:rgba(220,160,120,.9)');
      });
      if(themeDiscs.length){
        h+='<div class="disc-sub-head">Themes</div>';
        themeDiscs.forEach(([d,r])=>{ h+=renderDiscRow(d,r,'color:rgba(220,160,120,.75)'); });
      }
      h+='</div></div>';
    }
  }

  // Devotions (both modes)
  const devPowers=(c.powers||[]).filter(p=>p.category==='devotion');
  if(editMode||devPowers.length){
    h+='<div class="sh-sec"><div class="sh-sec-title">Devotions</div><div class="disc-list">';
    devPowers.forEach((p,i)=>{
      const pname=p.name;
      const gid='dev'+c.name.replace(/[^a-z]/gi,'')+i;
      const dbEntry=DEVOTIONS_DB.find(d=>d.n===pname);
      if(editMode){
        h+='<div class="disc-tap-row disc-edit" id="disc-row-'+gid+'" onclick="toggleDisc(\''+gid+'\')">'
          +'<div class="disc-tap-left"><span class="disc-tap-name" style="color:var(--txt2)">'+esc(pname)+'</span>'
          +(dbEntry?'<span class="dev-xp-tag">'+dbEntry.xp+' XP</span>':'')+'</div>'
          +'<div style="display:flex;align-items:center;gap:4px"><span class="disc-tap-arr">›</span>'
          +'<button class="dev-rm-btn" onclick="event.stopPropagation();shRemoveDevotion('+i+')" title="Remove">&times;</button></div></div>'
          +'<div class="disc-drawer" id="disc-drawer-'+gid+'"><div class="disc-power">'
          +(dbEntry?'<div class="dev-prereq">Requires: '+devPrereqStr(dbEntry)+'</div>':'')
          +(p.stats?'<div class="disc-power-stats">'+esc(p.stats)+'</div>':'')
          +'<div class="disc-power-effect">'+esc(p.effect||'')+'</div></div></div>';
      } else {
        h+='<div class="disc-tap-row" id="disc-row-'+gid+'" onclick="toggleDisc(\''+gid+'\')">'
          +'<div class="disc-tap-left"><span class="disc-tap-name" style="color:var(--txt2)">'+esc(pname)+'</span></div><span class="disc-tap-arr">›</span></div>'
          +'<div class="disc-drawer" id="disc-drawer-'+gid+'"><div class="disc-power">'
          +(p.stats?'<div class="disc-power-stats">'+esc(p.stats)+'</div>':'')
          +'<div class="disc-power-effect">'+esc(p.effect||'')+'</div></div></div>';
      }
    });
    if(editMode){
      const owned=new Set(devPowers.map(p=>p.name));
      const available=DEVOTIONS_DB.filter(d=>!owned.has(d.n)&&meetsDevPrereqs(c,d));
      h+='<div class="dev-add-row">';
      h+='<select id="dev-add-select" class="dev-add-sel" style="display:none">';
      if(available.length){
        available.forEach(d=>{
          h+='<option value="'+esc(d.n)+'">'+esc(d.n)+' ('+devPrereqStr(d)+') \u2014 '+d.xp+' XP</option>';
        });
      }
      h+='</select>';
      h+='<button class="dev-add-btn"'+(available.length?' onclick="shShowDevSelect(this)"':' disabled style="opacity:.4;cursor:default"')+'>'+(available.length?'+ Add Devotion ('+available.length+')':'No devotions available')+'</button>';
      h+='</div>';
    }
    h+='</div></div>';
  }

    // Rites (both modes)
  const ritesPowers=(c.powers||[]).filter(p=>p.category==='rite');
  if(ritesPowers.length){
    h+='<div class="sh-sec"><div class="sh-sec-title">Rites</div><div class="disc-list">';
    ritesPowers.forEach((p,i)=>{
      const gid='rite'+c.name.replace(/[^a-z]/gi,'')+i;
      h+='<div class="disc-tap-row" id="disc-row-'+gid+'" onclick="toggleDisc(\''+gid+'\')">'
        +'<div class="disc-tap-left"><span class="disc-tap-name" style="color:rgba(220,160,120,.9)">'+esc(p.name)+'</span><span class="disc-tap-dots" style="margin-left:6px;color:rgba(220,160,120,.75)">'+shDots(p.level)+'</span><span style="font-family:var(--fh);font-size:10px;color:var(--txt3);margin-left:8px">'+esc(p.tradition)+'</span></div><span class="disc-tap-arr">›</span></div>'
        +'<div class="disc-drawer" id="disc-drawer-'+gid+'"><div class="disc-power">'
        +(p.stats?'<div class="disc-power-stats">'+esc(p.stats)+'</div>':'')
        +'<div class="disc-power-effect">'+esc(p.effect||'')+'</div></div></div>';
    });
    h+='</div></div>';
  }

  // Pacts (both modes)
  const pactPowers=(c.powers||[]).filter(p=>p.category==='pact');
  if(pactPowers.length){
    h+='<div class="sh-sec"><div class="sh-sec-title">Pacts</div><div class="disc-list">';
    pactPowers.forEach((p,i)=>{
      const gid='pact'+c.name.replace(/[^a-z]/gi,'')+i;
      h+='<div class="disc-tap-row" id="disc-row-'+gid+'" onclick="toggleDisc(\''+gid+'\')">'
        +'<div class="disc-tap-left"><span class="disc-tap-name" style="color:var(--txt2)">'+esc(p.name)+'</span></div><span class="disc-tap-arr">›</span></div>'
        +'<div class="disc-drawer" id="disc-drawer-'+gid+'"><div class="disc-power">'
        +(p.stats?'<div class="disc-power-stats">'+esc(p.stats)+'</div>':'')
        +'<div class="disc-power-effect">'+esc(p.effect||'')+'</div></div></div>';
    });
    h+='</div></div>';
  }
  return h;
}

function shRenderInfluenceMerits(c,editMode){
  let h='';
  // Influence Merits
  const inflMerits=(c.merits||[]).filter(m=>m.category==='influence');
  if(editMode||inflMerits.length){
    const totalInfl=calcTotalInfluence(c);
    h+='<div class="sh-sec"><div class="sh-sec-title">Influence Merits</div><div class="merit-list">';
    if(editMode){
      const contactsTotalDots=Math.min(5,inflMerits.filter(m=>m.name==='Contacts').reduce((s,m)=>s+(m.rating||0),0));
      const contactsInf=calcContactsInfluence(c);
      inflMerits.forEach((m,idx)=>{
        const isContacts=m.name==='Contacts';
        const inf=isContacts?0:calcMeritInfluence(m);
        const typeOpts=INFLUENCE_MERIT_TYPES.map(t=>'<option'+(m.name===t?' selected':'')+'>'+t+'</option>').join('');
        const realIdx=c.merits.indexOf(m);
        const mc=(c.merit_creation&&c.merit_creation[realIdx])||{cp:0,free:0,xp:0};
        const derivedDots=(mc.cp||0)+(mc.free||0)+(mc.xp||0);
        h+='<div class="infl-edit-row">'
          +'<select class="infl-type" onchange="shEditInflMerit('+idx+',\'name\',this.value);renderSheet(chars[editIdx])">'+typeOpts+'</select>'
          +((()=>{
            const isNarrow=m.name==='Status'&&m.area&&!INFLUENCE_SPHERES.includes(m.area);
            if(m.name==='Allies'){
              return '<select class="infl-area" onchange="shEditInflMerit('+idx+',\'area\',this.value)">'
                +'<option value="">'+(m.area?'':'— sphere —')+'</option>'
                +INFLUENCE_SPHERES.map(s=>'<option'+(m.area===s?' selected':'')+'>'+s+'</option>').join('')
                +'</select>';
            } else if(isContacts){
              return '<span class="infl-area-fixed">'+esc(m.area||'—')+'</span>';
            } else if(m.name==='Resources'){
              return '<span class="infl-area-none"></span>';
            } else if(m.name==='Mentor'){
              return '<input type="text" class="infl-area" value="'+esc(m.area||'')+'" placeholder="Mentor name" onchange="shEditInflMerit('+idx+',\'area\',this.value)">';
            } else if(m.name==='Retainer'){
              return '<input type="text" class="infl-area" value="'+esc(m.area||'')+'" placeholder="Description" onchange="shEditInflMerit('+idx+',\'area\',this.value)">'
                +'<label class="infl-ghoul-lbl"><input type="checkbox"'+(m.ghoul?' checked':'')+' onchange="shEditInflMerit('+idx+',\'ghoul\',this.checked)"> Ghoul</label>';
            } else if(m.name==='Staff'){
              return '<input type="text" class="infl-area" value="'+esc(m.area||'')+'" placeholder="Area of expertise" onchange="shEditInflMerit('+idx+',\'area\',this.value)">';
            } else if(m.name==='Status'){
              return '<button class="infl-mode-btn" onclick="shEditStatusMode('+idx+',\''+(!isNarrow?'narrow':'sphere')+'\')" title="'+(isNarrow?'Switch to sphere':'Switch to narrow')+'">'
                +(isNarrow?'Sphere ↕':'Narrow ↕')+'</button>'
                +(isNarrow
                  ?'<input type="text" class="infl-area infl-area-narrow" value="'+esc(m.area||'')+'" placeholder="Narrow status" onchange="shEditInflMerit('+idx+',\'area\',this.value)">'
                  :'<select class="infl-area" onchange="shEditInflMerit('+idx+',\'area\',this.value)">'
                    +'<option value="">'+(m.area?'':'— sphere —')+'</option>'
                    +INFLUENCE_SPHERES.map(s=>'<option'+(m.area===s?' selected':'')+'>'+s+'</option>').join('')
                    +'</select>'
                );
            } else {
              return '<input type="text" class="infl-area" value="'+esc(m.area||'')+'" placeholder="Sphere / scope" onchange="shEditInflMerit('+idx+',\'area\',this.value)">';
            }
          })())
          +(isContacts
            ?'<span class="infl-dots-fixed" title="Each Contact is 1 dot">●</span>'
            :'<span class="infl-dots-derived">'+shDots(derivedDots)+'</span>'
          )
          +'<span class="infl-inf">'+(inf?'<span class="inf-val">'+inf+'</span> inf':'')+'</span>'
          +'<button class="dev-rm-btn" onclick="shRemoveInflMerit('+idx+')" title="Remove">&times;</button>'
          +'</div>';
        if(!isContacts){
          h+=meritBdRow(realIdx, mc);
        }
      });
      if(inflMerits.some(m=>m.name==='Contacts')){
        h+='<div class="infl-contacts-total">Contacts total: '+shDots(contactsTotalDots)+(contactsInf?' — <span class="inf-val">'+contactsInf+'</span> inf':'')+'</div>';
      }
      h+='<div class="dev-add-row">'
        +'<button class="dev-add-btn" onclick="shAddInflMerit(\'Allies\')">+ Add Allies / Other</button>'
        +'<button class="dev-add-btn" onclick="shAddInflMerit(\'Contacts\')">+ Add Contact</button>'
        +'</div>';
      h+='<div class="infl-total">Total Influence: <span class="inf-n">'+totalInfl+'</span></div>';
    } else {
      // Non-Contacts: render individually
      inflMerits.filter(m=>m.name!=='Contacts').forEach((m,idx)=>{
        const area=m.area?m.area.trim():null;
        const ghoulTag=m.name==='Retainer'&&m.ghoul?' (ghoul)':'';
        const mStr=(area?m.name+' ('+area+ghoulTag+')':m.name+ghoulTag)+(m.rating?' '+shDots(m.rating):'');
        h+=shRenderMeritRow(mStr,'infl',idx);
      });
      // Contacts: compile into one row
      const contactEntries=inflMerits.filter(m=>m.name==='Contacts');
      if(contactEntries.length){
        const totalDots=Math.min(5,contactEntries.reduce((s,m)=>s+(m.rating||0),0));
        const spheres=contactEntries.map(m=>(m.area||'').trim()).filter(Boolean).join(', ');
        const mStr='Contacts'+(spheres?' ('+spheres+')':'')+(totalDots?' '+shDots(totalDots):'');
        h+=shRenderMeritRow(mStr,'infl','contacts');
      }
      h+='<div class="infl-total">Total Influence: <span class="inf-n">'+totalInfl+'</span></div>';
    }
    h+='</div></div>';
  }

  return h;
}

function shRenderDomainMerits(c,editMode){
  let h='';
  const domMerits=(c.merits||[]).filter(m=>m.category==='domain');
  // Domain merits
  if(editMode||domMerits.length){
    h+='<div class="sh-sec"><div class="sh-sec-title">Domain Merits</div><div class="merit-list">';
    if(editMode){
      domMerits.forEach((m,di)=>{
        const herdTaken=domMerits.some((dm,dj)=>dm.name==='Herd'&&dj!==di);
        const typeOpts=DOMAIN_MERIT_TYPES.filter(t=>t!=='Herd'||!herdTaken||m.name==='Herd').map(t=>'<option'+(m.name===t?' selected':'')+'>'+esc(t)+'</option>').join('');
        const realIdx=c.merits.indexOf(m);
        const mc=(c.merit_creation&&c.merit_creation[realIdx])||{cp:0,free:0,xp:0};
        const derivedDots=(mc.cp||0)+(mc.free||0)+(mc.xp||0);
        const partners=m.shared_with||[];
        const effectiveTotal=domMeritTotal(c,m.name);
        const availablePartners=chars.filter(ch=>ch.name!==c.name&&!partners.includes(ch.name));
        h+='<div class="dom-edit-block">';
        h+='<div class="infl-edit-row">'
          +'<select class="infl-type" onchange="shEditDomMerit('+di+',\'name\',this.value)">'+typeOpts+'</select>'
          +'<span class="dom-contrib-lbl">My dots: '+shDots(derivedDots)+'</span>'
          +'<span class="dom-total-lbl" title="Total across all contributors">Total: '+shDots(effectiveTotal)+'</span>'
          +'<button class="dev-rm-btn" onclick="shRemoveDomMerit('+di+')" title="Remove">&times;</button>'
          +'</div>';
        h+=meritBdRow(realIdx, mc);
        // Shared partners — Herd cannot be shared
        if(m.name!=='Herd'&&partners.length){
          h+='<div class="dom-partners-row">';
          partners.forEach(pName=>{
            const p=chars.find(ch=>ch.name===pName);
            const pDots=p?domMeritShareable(p,m.name):0;
            h+='<span class="dom-partner-tag">'+esc(pName)+(pDots?' '+shDots(pDots):' ○')+'<button class="dom-partner-rm" onclick="shRemoveDomainPartner('+di+',\''+pName.replace(/'/g,"\\'")+'\')">×</button></span>';
          });
          h+='</div>';
        }
        if(m.name!=='Herd'&&availablePartners.length){
          h+='<div class="dom-add-partner-row"><select class="dom-partner-sel" onchange="if(this.value){shAddDomainPartner('+di+',this.value);this.value=\'\';}">'
            +'<option value="">+ Add shared partner…</option>'
            +availablePartners.map(p=>'<option value="'+esc(p.name)+'">'+esc(p.name)+'</option>').join('')
            +'</select></div>';
        }
        h+='</div>';
      });
      h+='<div class="dev-add-row"><button class="dev-add-btn" onclick="shAddDomMerit()">+ Add Domain Merit</button></div>';
    } else {
      domMerits.forEach(m=>{
        const domPartners=m.shared_with&&m.shared_with.length?m.shared_with:null;
        const domEffective=domMeritTotal(c,m.name);
        const domOwnDots=domMeritContrib(c,m.name);
        h+='<div class="merit-plain"><div style="flex:1"><div class="merit-name-sh">'+esc(m.name)+'</div>'
          +(domPartners?'<div class="merit-sub-sh dom-shared-lbl">Shared · '+domPartners.map(n=>{const p=chars.find(ch=>ch.name===n);const pd=p?domMeritShareable(p,m.name):0;return esc(n)+(pd?' '+shDots(pd):'');}).join(', ')+'</div>':'')
          +'</div>'
          +'<div style="text-align:right">'
          +(domPartners?'<div class="dom-total-view">'+shDots(domEffective)+'</div><div class="dom-own-view">mine: '+shDots(domOwnDots)+'</div>':'<span class="merit-dots-sh">'+shDots(domEffective)+'</span>')
          +'</div></div>';
      });
    }
    h+='</div></div>';
  }

  return h;
}

    h+='</div></div>';
  }
  return h;

          h+='<div class="merit-plain'+(pf?' merit-prereq-fail':'')+'"><div style="flex:1"><div class="merit-name-sh">'+esc(m.name)+esc(qual)+'</div></div>'

function shRenderMeritRow(m, idPrefix, i){
  const base2=meritBase(m);
  const dcnt=meritDotCount(m);
  const dotsStr=dcnt?shDots(dcnt):'';
  const parenMatch=base2.match(/^([^(]+?)\s*\((.+)\)$/);
  const mainName=parenMatch?parenMatch[1].trim():base2;
  const subName=parenMatch?parenMatch[2].trim():null;
  const nameHtml=subName
    ?'<div class="merit-name-sh">'+esc(mainName)+'</div><div class="merit-sub-sh">'+esc(subName)+'</div>'
    :'<div class="merit-name-sh">'+esc(mainName)+'</div>';
  const db2=meritLookup(m);
  const dotsTag=dotsStr?'<span class="merit-dots-sh">'+dotsStr+'</span>':'';
  if(db2&&db2.desc){
    const id2=idPrefix+i;
    const body2='<div>'+esc(db2.desc)+'</div>'+(db2.prereq?'<div style="margin-top:5px;font-style:italic;color:var(--txt3)">Prerequisite: '+esc(db2.prereq)+'</div>':'');
    return '<div class="exp-row" id="exp-row-'+id2+'" onclick="toggleExp(\''+id2+'\')"><div style="flex:1;min-width:0">'+nameHtml+'</div>'+dotsTag+'<span class="exp-arr">›</span></div>'
      +'<div class="exp-body" id="exp-body-'+id2+'">'+body2+'</div>';
  }
  return '<div class="merit-plain"><div style="flex:1;min-width:0">'+nameHtml+'</div>'+dotsTag+'</div>';
}

function editFromSheet(){

  const savedScroll=scrollEl.scrollTop;

    btn.textContent = editMode ? 'Done' : 'Edit';

function shEdit(field, val){
  if(editIdx<0) return;
  chars[editIdx][field] = val || null;
  markDirty();
  // If clan changed, update curse bane
  if(field === 'clan'){
    const c = chars[editIdx];
    const newCurse = CLAN_BANES[val];
    if(newCurse){
      if(!c.banes) c.banes = [];
      const ci = c.banes.findIndex(b=>Object.values(CLAN_BANES).some(cb=>cb.name===b.name));
      if(ci>=0) c.banes[ci] = {...newCurse};
      else c.banes.unshift({...newCurse});
    }
    // Clear bloodline if not valid for new clan
    const validBLs = BLOODLINE_CLANS[val]||[];
    if(c.bloodline && !validBLs.includes(c.bloodline)) c.bloodline = null;
    renderSheet(c);
  }
}

function shSetPriority(cat, val){
  if(editIdx<0) return;
  const c = chars[editIdx];
  if(!c.attribute_priorities) c.attribute_priorities = {};
  const old = c.attribute_priorities[cat];
  if(old === val) return;
  // Swap: find who currently has this value and give them the old one
  const cats = ['Mental','Physical','Social'];
  cats.forEach(k=>{
    if(k !== cat && c.attribute_priorities[k] === val){
      c.attribute_priorities[k] = old || 'Tertiary';
    }
  });
  c.attribute_priorities[cat] = val;
  markDirty();
  renderSheet(c);
}
function shEditDiscPt(disc, field, val){
  if(editIdx<0) return;
  const c = chars[editIdx];
  if(!c.disc_creation) c.disc_creation = {};
  if(!c.disc_creation[disc]) c.disc_creation[disc] = {cp:0,free:0,xp:0};
  val = Math.max(0, val||0);
  if(field === 'cp'){
    // Enforce: 3 total CP, max 1 out-of-clan CP
    const inClanList = BLOODLINE_DISCS[c.bloodline]||CLAN_DISCS[c.clan]||[];
    const isInClan = inClanList.includes(disc);
    const otherCP = Object.entries(c.disc_creation)
      .filter(([d])=>d!==disc)
      .reduce((s,[,v])=>s+(v.cp||0), 0);
    val = Math.min(val, 3 - otherCP);
    if(!isInClan){
      const otherOutCP = Object.entries(c.disc_creation)
        .filter(([d])=>d!==disc&&!inClanList.includes(d))
        .reduce((s,[,v])=>s+(v.cp||0), 0);
      val = Math.min(val, 1 - otherOutCP);
    }
    if(val < 0) val = 0;
  }
  c.disc_creation[disc][field] = val;
  const cr = c.disc_creation[disc];
  const inClanList2 = BLOODLINE_DISCS[c.bloodline]||CLAN_DISCS[c.clan]||[];
  const discBase = (cr.cp||0) + (cr.free||0);
  const discCostMult = RITUAL_DISCS.includes(disc) ? 4 : (inClanList2.includes(disc) ? 3 : 4);
  const newDots = discBase + xpToDots(cr.xp||0, discBase, discCostMult);
  if(!c.disciplines) c.disciplines = {};
  c.disciplines[disc] = newDots;
  // Recalculate XP spent on disciplines
  if(!c.xp_log) c.xp_log = {earned:{},spent:{}};
  let discXpTotal = 0;
  Object.entries(c.disc_creation||{}).forEach(([d,v])=>{
    discXpTotal += v.xp||0;
  });
  c.xp_log.spent.powers = discXpTotal;
  c.xp_total = xpEarned(c);
  c.xp_spent = xpSpent(c);
  markDirty();
  renderSheet(c);
}

function shEditSkillPt(skill, field, val){
  if(editIdx<0) return;
  const c = chars[editIdx];
  if(!c.skill_creation) c.skill_creation = {};
  if(!c.skill_creation[skill]) c.skill_creation[skill] = {cp:0,free:0,xp:0};
  val = Math.max(0, val||0);
  if(field === 'cp'){
    const cat = Object.entries(SKILL_CATS).find(([k,v])=>v.includes(skill));
    if(cat){
      const pri = (c.skill_priorities||{})[cat[0]]||'Primary';
      const budget = SKILL_PRI_BUDGETS[pri]||11;
      const otherCP = cat[1].filter(s=>s!==skill).reduce((s,sk)=>s+(((c.skill_creation||{})[sk]||{}).cp||0), 0);
      val = Math.min(val, budget - otherCP);
      if(val < 0) val = 0;
    }
  }
  c.skill_creation[skill][field] = val;
  const cr = c.skill_creation[skill];
  const skBase = (cr.cp||0) + (cr.free||0);
  const newDots = skBase + xpToDots(cr.xp||0, skBase, 2);
  if(!c.skills) c.skills = {};
  if(!c.skills[skill]) c.skills[skill] = {dots:0,bonus:0,specs:[],nine_again:false};
  else if(typeof c.skills[skill] !== 'object') c.skills[skill] = {dots:c.skills[skill],bonus:0,specs:[],nine_again:false};
  c.skills[skill].dots = newDots;
  // Recalculate XP spent on skills
  if(!c.xp_log) c.xp_log = {earned:{},spent:{}};
  let skXpTotal = 0;
  ALL_SKILLS.forEach(s=>{
    const scr = (c.skill_creation||{})[s]||{};
    const baseBeforeXp = (scr.cp||0) + (scr.free||0);
    const xpDots = scr.xp||0;
    for(let d=0; d<xpDots; d++){
      skXpTotal += (baseBeforeXp + d + 1) * 2;
    }
  });
  c.xp_log.spent.skills = skXpTotal;
  c.xp_total = xpEarned(c);
  c.xp_spent = xpSpent(c);
  markDirty();
  renderSheet(c);
}
function shEditAttrPt(attr, field, val){
  if(editIdx<0) return;
  const c = chars[editIdx];
  if(!c.attr_creation) c.attr_creation = {};
  if(!c.attr_creation[attr]) c.attr_creation[attr] = {cp:0,free:0,xp:0};
  val = Math.max(0, val||0);
  if(field === 'cp'){
    // Enforce category CP cap
    const cat = Object.entries(ATTR_CATS).find(([k,v])=>v.includes(attr));
    if(cat){
      const pri = (c.attribute_priorities||{})[cat[0]]||'Primary';
      const budget = PRI_BUDGETS[pri]||5;
      const otherCP = cat[1].filter(a=>a!==attr).reduce((s,a)=>s+(((c.attr_creation||{})[a]||{}).cp||0), 0);
      val = Math.min(val, budget - otherCP);
      if(val < 0) val = 0;
    }
  }
  c.attr_creation[attr][field] = val;
  const cr = c.attr_creation[attr];
  const attrBase = (cr.cp||0) + (cr.free||0);
  const newDots = attrBase + xpToDots(cr.xp||0, attrBase, 4);

let chars = [];         // working array
let editIdx = -1;       // index into chars
let dirty = new Set();  // indices of modified characters

function loadDB(){
  try {
    const raw = localStorage.getItem('tm_chars_db');
    if(raw){ chars = JSON.parse(raw); return; }
  } catch(e){}
  try {
    const imp = localStorage.getItem('tm_import_chars');
    if(imp){ chars = JSON.parse(imp); return; }
  } catch(e){}
  // Fall back to built-in data
  chars = JSON.parse(JSON.stringify(CHARS_DATA));
}

function charsForSave(){
  // Deep copy with derived merits stripped
  return chars.map(c=>{
    const copy=JSON.parse(JSON.stringify(c));
    if(copy.merits){
      for(let i=copy.merits.length-1;i>=0;i--){
        if(copy.merits[i].derived){
          copy.merits.splice(i,1);
          if(copy.merit_creation&&copy.merit_creation[i]!==undefined) copy.merit_creation.splice(i,1);
        }
      }
    }
    return copy;
  });
}

function saveDB(){
  localStorage.setItem('tm_chars_db', JSON.stringify(charsForSave()));
  dirty.clear();
  renderList();
  updDirtyBadge();
}

function saveAll(){
  saveDB();
  document.getElementById('btn-save').textContent = 'Saved ✓';
  setTimeout(()=>{ document.getElementById('btn-save').textContent = 'Save All'; }, 1500);
}

function syncToSuite(){
  const clean=charsForSave();
  localStorage.setItem('tm_chars_db', JSON.stringify(clean));
  localStorage.setItem('tm_import_chars', JSON.stringify(clean));
  localStorage.setItem('tm_import_meta', JSON.stringify({
    filename:'tm_editor',
    count:clean.length,
    date:new Date().toISOString()
  }));
  dirty.clear();
  renderList();
  updDirtyBadge();
  alert('Synced ' + clean.length + ' characters to ST Suite (tm_import_chars).');
}

function markDirty(idx){
  if(idx === undefined) idx = editIdx;
  if(idx < 0) return;
  dirty.add(idx);
  updDirtyBadge();
}

function updDirtyBadge(){
  const el = document.getElementById('edit-dirty');
  if(el) el.classList.toggle('on', dirty.size > 0);
}

/* ══════════════════════════════════════════════════════════
   VIEW MANAGEMENT
══════════════════════════════════════════════════════════ */
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.topbar-btn').forEach(b=>b.classList.remove('on'));
  const vEl=document.getElementById('v-'+v);
  const nEl=document.getElementById('nav-'+v);
  if(vEl) vEl.classList.add('active');
  if(nEl) nEl.classList.add('on');
  if(v==='list') renderList();
}

function showEditTab(t){
  document.querySelectorAll('.edit-tab').forEach(b=>b.classList.remove('on'));
  document.querySelector(`.edit-tab[data-tab="${t}"]`).classList.add('on');
  document.querySelectorAll('.etab').forEach(el=>el.classList.remove('active'));
  document.getElementById('et-'+t).classList.add('active');
}

/* ══════════════════════════════════════════════════════════
   LIST VIEW
══════════════════════════════════════════════════════════ */
function renderList(){
  const grid = document.getElementById('char-grid');
  const search = document.querySelector('.list-search').value.toLowerCase();
  const clanF = document.getElementById('filter-clan').value;
  const covF = document.getElementById('filter-cov').value;
  
  let filtered = chars.map((c,i)=>({c,i})).filter(({c})=>{
    if(clanF && c.clan !== clanF) return false;
    if(covF && c.covenant !== covF) return false;
    if(search){
      const hay = (c.name+' '+c.player+' '+(c.concept||'')+' '+(c.bloodline||'')).toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });
  
  filtered.sort((a,b)=>a.c.name.localeCompare(b.c.name));
  
  grid.innerHTML = filtered.map(({c,i})=>{
    const bp = c.blood_potency||1;
    const hum = c.humanity != null ? c.humanity : '?';
    const xpL = xpLeft(c);
    
    const isDirty = dirty.has(i) ? ' dirty' : '';
    const title = c.court_title ? `<span class="cc-tag title">${esc(c.court_title)}</span>` : '';
    const ci = covIcon(c.covenant,28) + clanIcon(c.clan,28);
    return `<div class="char-card${isDirty}" onclick="openChar(${i})">
      <div class="cc-top">
        <div style="display:flex;gap:4px;flex-shrink:0">${ci}</div>
        <div class="cc-identity"><span class="cc-name">${esc(c.name)}</span><br><span class="cc-player">${esc(c.player||'')}</span></div>
      </div>
      <div class="cc-mid">
        <span class="cc-tag cov">${covIcon(c.covenant,14)} ${esc(shortCov(c.covenant))}</span>
        <span class="cc-tag clan">${clanIcon(c.clan,14)} ${esc(c.clan||'?')}</span>
        ${c.bloodline?`<span class="cc-tag">${esc(c.bloodline)}</span>`:''}
        ${title}
      </div>
      <div class="cc-bot">
        <span>BP <span class="val">${bp}</span></span>
        <span>Hum <span class="val">${hum}</span></span>
        <span>XP <span class="val">${xpL}/${xpEarned(c)}</span></span>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('list-count').textContent = filtered.length + ' / ' + chars.length + ' characters';
}

function filterList(){ renderList(); }

function shortCov(c){
  if(!c) return '?';
  const m = {'Carthian Movement':'Carthian','Circle of the Crone':'Crone','Lancea et Sanctum':'Lance','Ordo Dracul':'Ordo'};
  return m[c] || c;
}

══════════════════════════════════════════════════════════ */
function openChar(idx){
  editIdx = idx;
  const c = chars[idx];
  // Update edit header too
  document.getElementById('edit-charname').textContent = c.name || 'Unnamed';
  const hdrIcon = document.getElementById('edit-clan-icon');
  const ck = CLAN_ICON_KEY[c.clan];
  if(ck && hdrIcon){ hdrIcon.src = ICONS[ck]; hdrIcon.style.display='inline'; }
  else if(hdrIcon){ hdrIcon.style.display='none'; }
  renderIdentityTab(c);
  renderAttrsTab(c);
  // Show sheet view
  renderSheet(c);
  showView('sheet');
}

function getAttrVal(c, attr){ return c.attributes?.[attr]?.dots || 0; }
function getAttrBonus(c, attr){ return c.attributes?.[attr]?.bonus || 0; }
function setAttrVal(c, attr, dots, bonus){
  if(!c.attributes) c.attributes = {};
  c.attributes[attr] = { dots: dots, bonus: bonus || 0 };
}

function getSkillObj(c, skill){
  const v = c.skills?.[skill];
  if(!v) return {dots:0, bonus:0, specs:[], nine_again:false};
  return {dots:v.dots||0, bonus:v.bonus||0, specs:v.specs||[], nine_again:!!v.nine_again};
}
function setSkillObj(c, skill, obj){
  if(!c.skills) c.skills = {};
  if(!obj.specs?.length && !obj.nine_again && !obj.bonus && obj.dots === 0){
    delete c.skills[skill];
  } else {
    c.skills[skill] = { dots:obj.dots, bonus:obj.bonus||0, specs:obj.specs||[], nine_again:!!obj.nine_again };
  }
}
function meetsDevPrereqs(c, dev){
  // Bloodline restriction
  if(dev.bl && (c.bloodline||'') !== dev.bl) return false;
  const discs=c.disciplines||{};
  // Bloodline devotions with no disc prereqs: just need the bloodline
  if(!dev.p||!dev.p.length) return true;
  if(dev.or){
    return dev.p.some(p=>(discs[p.disc]||0)>=p.dots);
  }
  return dev.p.every(p=>(discs[p.disc]||0)>=p.dots);
}
function devPrereqStr(dev){
  const parts=[];
  if(dev.bl) parts.push(dev.bl+' only');
  if(dev.p&&dev.p.length) parts.push(dev.p.map(p=>p.disc+' '+p.dots).join(dev.or?' or ':', '));
  return parts.join('; ')||'None';
}

function calcMeritInfluence(m){
  // Contacts handled separately via calcContactsInfluence
  if(m.name==='Contacts') return 0;
  // Standard influence merits: 1 at 3 dots, 2 at 5 dots
  // Narrow status: 1 at 5 dots only
  const r=m.rating||0;
  if(m.name==='Status'){
    const area=(m.area||'').trim();
    const isNarrow=area&&!INFLUENCE_SPHERES.some(s=>area.toLowerCase().includes(s.toLowerCase()));
    if(isNarrow) return r>=5?1:0;
  }
  if(r>=5) return 2;
  if(r>=3) return 1;
  return 0;
}
function calcContactsInfluence(c){
  const total=Math.min(5,(c.merits||[]).filter(m=>m.category==='influence'&&m.name==='Contacts').reduce((s,m)=>s+(m.rating||0),0));
  if(total>=5) return 2;
  if(total>=3) return 1;
  return 0;
}
function calcTotalInfluence(c){
  let total=0;
  // Clan + Covenant status: 1 per dot each
  const st=c.status||{};
  total+=(st.clan||0)+(st.covenant||0);
  // Influence merits (Contacts excluded from per-entry calc)
  (c.merits||[]).filter(m=>m.category==='influence').forEach(m=>{total+=calcMeritInfluence(m);});
  // Contacts: sum all dots, apply threshold to total
  total+=calcContactsInfluence(c);
  // MCI at 5 dots: 1 influence
  const mci=(c.merits||[]).find(m=>m.name==='Mystery Cult Initiation');
  if(mci&&mci.rating>=5) total+=1;
  return total;
}

// ── Prereq checker for general merit dropdown ──
const ATTR_NAMES = new Set(['intelligence','wits','resolve','strength','dexterity','stamina','presence','manipulation','composure']);
const SKILL_NAMES = new Set(['academics','animal ken','athletics','brawl','computer','crafts','drive','empathy','expression','firearms','intimidation','investigation','larceny','medicine','occult','persuasion','politics','science','socialise','stealth','streetwise','subterfuge','survival','weaponry']);
const DISC_NAMES = new Set(['animalism','auspex','celerity','dominate','majesty','nightmare','obfuscate','protean','resilience','vig\u00f4r','vigour','cruac','the\u00f0an','theban']);
const COV_SHORT = {'crone':'Circle of the Crone','carthian':'Carthian Movement','invictus':'Invictus','lance':'Lancea et Sanctum','sanctified':'Lancea et Sanctum'};
const CLAN_NAMES = new Set(['daeva','gangrel','mekhet','nosferatu','ventrue']);

function _getAttrDots(c, name){
  const k=Object.keys(c.attributes||{}).find(a=>a.toLowerCase()===name);
  return k?(c.attributes[k].dots||0):0;
}
function _getSkillDots(c, name){
  const k=Object.keys(c.skills||{}).find(s=>s.toLowerCase()===name);
  return k?(c.skills[k].dots||0):0;
}
function _getDiscDots(c, name){
  const n=name.toLowerCase();
  const k=Object.keys(c.disciplines||{}).find(d=>d.toLowerCase()===n);
  return k?(c.disciplines[k]||0):0;
}
function _getMeritRating(c, name){
  const n=name.toLowerCase();
  const m=(c.merits||[]).find(m=>m.name.toLowerCase()===n);
  return m?(m.rating||1):0;
}
function _getCovStatus(c, covShort){
  const fullName=COV_SHORT[covShort.toLowerCase()]||covShort;
  if((c.covenant||'').toLowerCase()===fullName.toLowerCase()) return c.status?.covenant||0;
  const standings=c.covenant_standings||{};
  const k=Object.keys(standings).find(k=>k.toLowerCase()===covShort.toLowerCase()||standings[k]===covShort);
  return k?standings[k]:0;
}

function checkSinglePrereq(c, token){
  token=token.trim();
  if(!token||token==='None'||token==='-') return true;

  // "No X Status"
  const noStatus=/^No\s+(\w+)\s+Status$/i.exec(token);
  if(noStatus){
    const cov=noStatus[1];
    return _getCovStatus(c, cov)===0;
  }

  // "City Status N"
  const cityStatus=/^City\s+Status\s+(\d+)$/i.exec(token);
  if(cityStatus) return (c.status?.city||0)>=parseInt(cityStatus[1]);

  // "Clan Status N" or "[ClanName] Status N"
  const clanStatus=/^(?:Clan\s+)?(\w+)\s+Status\s+(\d+)$/i.exec(token);
  if(clanStatus){
    const word=clanStatus[1].toLowerCase();
    const n=parseInt(clanStatus[2]);
    if(word==='clan') return (c.status?.clan||0)>=n;
    if(COV_SHORT[word]) return _getCovStatus(c,word)>=n;
    // Could be a specific clan status label — treat as covenant check
    return _getCovStatus(c,word)>=n;
  }

  // "Humanity < N"
  const humLt=/^Humanity\s*<\s*(\d+)$/i.exec(token);
  if(humLt) return (c.humanity||7)<parseInt(humLt[1]);

  // "X Bloodline" or "Bloodline X"
  if(/bloodline/i.test(token)){
    const bl=(c.bloodline||'').toLowerCase();
    return bl&&token.toLowerCase().includes(bl);
  }

  // Clan name alone
  if(CLAN_NAMES.has(token.toLowerCase())) return (c.clan||'').toLowerCase()===token.toLowerCase();

  // "SkillName Specialisation" or "Specialised Skill N" — just pass (too complex)
  if(/speciali[sz]/i.test(token)) return true;

  // "Attribute N"
  const withNum=/^(.+?)\s+(\d+)$/.exec(token);
  if(withNum){
    const name=withNum[1].trim().toLowerCase();
    const n=parseInt(withNum[2]);
    if(ATTR_NAMES.has(name)) return _getAttrDots(c,name)>=n;
    if(SKILL_NAMES.has(name)) return _getSkillDots(c,name)>=n;
    if(DISC_NAMES.has(name)||name==='cru\u00e1c') return _getDiscDots(c,name)>=n||_getDiscDots(c,'cruac')>=n;
    // Merit as prereq e.g. "Safe Place 1", "Contacts 2"
    return _getMeritRating(c,name)>=n;
  }

  // Token without number — presence of merit / discipline / skill
  const nameLow=token.toLowerCase();
  if(ATTR_NAMES.has(nameLow)) return _getAttrDots(c,nameLow)>0;
  if(SKILL_NAMES.has(nameLow)) return _getSkillDots(c,nameLow)>0;
  if(DISC_NAMES.has(nameLow)) return _getDiscDots(c,nameLow)>0;
  // Flock/Herd ≤ and similar — just pass
  if(/[≤≥<>]/.test(token)) return true;
  // Merit name without number — just needs to exist
  return _getMeritRating(c,nameLow)>0||true; // permissive fallback
}

function meritQualifies(c, prereqStr){
  if(!prereqStr||prereqStr==='-') return true;
  // Split on ',' first (AND), then each piece may contain ' or ' (OR)
  const andParts=prereqStr.split(/\s*,\s*/);
  return andParts.every(part=>{
    const orParts=part.split(/\s+or\s+/i);
    return orParts.some(t=>checkSinglePrereq(c,t.trim()));
  });
}

function buildMeritOptions(c, currentName){
  const excluded=new Set(['standing','invictus oath','style']);
  const domainNames=new Set(['safe place','haven','feeding grounds','herd']);
  const influenceNames=new Set(['allies','contacts','mentor','resources','retainer','staff','status']);
  const qualified=[];
  for(const [key,entry] of Object.entries(MERITS_DB)){
    if(entry.special==='standing') continue;
    if(entry.type&&excluded.has(entry.type.toLowerCase())) continue;
    if(domainNames.has(key)) continue;
    if(influenceNames.has(key)) continue;
    if(!meritQualifies(c, entry.prereq||'')) continue;
    // Title-case the key
    const label=key.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
    qualified.push({key, label});
  }
  qualified.sort((a,b)=>a.label.localeCompare(b.label));
  const curLow=(currentName||'').toLowerCase();
  let opts='<option value="">'+(currentName?'':'— select merit —')+'</option>';
  // If current value isn't in the list (custom or unqualified), add it
  if(currentName&&!qualified.some(q=>q.key===curLow)){
    opts+='<option value="'+esc(currentName)+'" selected>'+esc(currentName)+'</option>';
  }
  for(const {key,label} of qualified){
    const sel=key===curLow||label.toLowerCase()===curLow?' selected':'';
    opts+='<option value="'+esc(label)+'"'+sel+'>'+esc(label)+'</option>';
  }
  return opts;
}

// ── Shared domain merit helpers ──
function domMeritContrib(c, name){
  // This character's own contribution to a named domain merit (all sources)
  const m=(c.merits||[]).find(m=>m.category==='domain'&&m.name===name);
  if(!m) return 0;
  const realIdx=(c.merits||[]).indexOf(m);
  const mc=(c.merit_creation&&c.merit_creation[realIdx])||{cp:0,free:0,xp:0};
  return (mc.cp||0)+(mc.free||0)+(mc.xp||0);
}
function domMeritShareable(c, name){
  // CP + XP portion — this is what partners contribute to a shared pool (not Free)
  const m=(c.merits||[]).find(m=>m.category==='domain'&&m.name===name);
  if(!m) return 0;
  const realIdx=(c.merits||[]).indexOf(m);
  const mc=(c.merit_creation&&c.merit_creation[realIdx])||{cp:0,free:0,xp:0};
  return (mc.cp||0)+(mc.xp||0);
}
function domMeritTotal(c, name){
  // Effective total = this char's full dots + partners' CP+XP only, capped at 5
  const m=(c.merits||[]).find(m=>m.category==='domain'&&m.name===name);
  if(!m) return 0;
  const own=domMeritContrib(c,name);
  const partners=m.shared_with||[];
  let total=own;
  for(const pName of partners){
    const p=chars.find(ch=>ch.name===pName);
    if(p) total+=domMeritShareable(p,name);
  }
  return Math.min(5,total);
}
function shAddDomainPartner(domIdx, partnerName){
  // Link partnerName to the domain merit at domIdx on the current char
  if(editIdx<0) return;
  const c=chars[editIdx];
  const {merit:m}=meritByCategory(c,'domain',domIdx);
  if(!m) return;
  const meritName=m.name;
  if(!m.shared_with) m.shared_with=[];
  if(m.shared_with.includes(partnerName)) return; // already linked

  // The full new group = current char + existing partners + new partner
  const fullGroup=[c.name,...(m.shared_with||[]),partnerName];

  // Update all existing group members to include new partner
  for(const memberName of [c.name,...(m.shared_with||[])]){
    const member=chars.find(ch=>ch.name===memberName);
    if(!member) continue;
    const mm=(member.merits||[]).find(x=>x.category==='domain'&&x.name===meritName);
    if(mm){
      mm.shared_with=fullGroup.filter(n=>n!==memberName);
    }
  }

  // Ensure the new partner has this domain merit (add at 0 if missing)
  const partner=chars.find(ch=>ch.name===partnerName);
  if(partner){
    let pm=(partner.merits||[]).find(x=>x.category==='domain'&&x.name===meritName);
    if(!pm){
      pm={category:'domain',name:meritName,rating:0,shared_with:fullGroup.filter(n=>n!==partnerName)};
      addMerit(partner,pm);
    } else {
      pm.shared_with=fullGroup.filter(n=>n!==partnerName);
    }
  }

  markDirty();
  renderSheet(c);
}
function shRemoveDomainPartner(domIdx, partnerName){
  if(editIdx<0) return;
  const c=chars[editIdx];
  const {merit:m}=meritByCategory(c,'domain',domIdx);
  if(!m) return;
  const meritName=m.name;

  // Remove partnerName from all remaining group members' shared_with
  const remainingGroup=[c.name,...(m.shared_with||[])].filter(n=>n!==partnerName);
  for(const memberName of remainingGroup){
    const member=chars.find(ch=>ch.name===memberName);
    if(!member) continue;
    const mm=(member.merits||[]).find(x=>x.category==='domain'&&x.name===meritName);
    if(mm) mm.shared_with=remainingGroup.filter(n=>n!==memberName);
  }

  // On the partner: remove this char from their shared_with
  const partner=chars.find(ch=>ch.name===partnerName);
  if(partner){
    const pm=(partner.merits||[]).find(x=>x.category==='domain'&&x.name===meritName);
    if(pm){
      pm.shared_with=(pm.shared_with||[]).filter(n=>n!==c.name&&n!==partnerName);
      // If partner has 0 contribution and no remaining partners, remove the merit
      const pRealIdx=partner.merits.indexOf(pm);
      const pmc=(partner.merit_creation&&partner.merit_creation[pRealIdx])||{cp:0,free:0,xp:0};
      const pContrib=(pmc.cp||0)+(pmc.free||0)+(pmc.xp||0);
      if(pContrib===0&&pm.shared_with.length===0){
        removeMerit(partner,pRealIdx);
      }
    }
  }

  markDirty();
  renderSheet(c);
}

function xpToDots(xpSpent, baseBeforeXP, costPerDot){
  return Math.floor((xpSpent||0) / costPerDot);
}
function dotsToXP(numDots, baseBeforeXP, costPerDot){
  return (numDots||0) * costPerDot;
}
function formatSpecs(c, specs){
  if(!specs||!specs.length) return '';
  return specs.map(sp=>{
    const enhanced=hasAoE(c,sp);
    return esc(sp)+(enhanced?' <span style="color:rgba(140,200,140,.8)">+2</span>':'');
  }).join(', ');
}
function hasAoE(c, specName){
  return (c.merits||[]).some(m=>m.name==='Area of Expertise'&&m.qualifier&&m.qualifier.toLowerCase()===specName.toLowerCase());
}
function xpEarned(c){
  const e=(c.xp_log||{}).earned||{};
  return (e.starting||0)+(e.humanity_drop||0)+(e.ordeals||0)+(e.game||0);
}
function xpSpent(c){
  const s=(c.xp_log||{}).spent||{};
  return (s.attributes||0)+(s.skills||0)+(s.merits||0)+(s.powers||0)+(s.special||0);
}
function xpLeft(c){ return xpEarned(c) - xpSpent(c); }
function calcHealth(c){
  const resilience = (c.disciplines||{}).Resilience||0;
  return getAttrVal(c,'Stamina') + calcSize(c) + resilience;
}
function calcWillpowerMax(c){
  return getAttrVal(c,'Resolve') + getAttrVal(c,'Composure');
}
function calcSize(c){
  const giant = (c.merits||[]).find(m=>m.name==='Giant');
  return 5 + (giant ? 1 : 0);
}
function calcSpeed(c){
  const str = getAttrVal(c,'Strength');
  const dex = getAttrVal(c,'Dexterity');
  const sz = calcSize(c);
  const vigour = (c.disciplines||{}).Vigour||0;
  const fleet = (c.merits||[]).find(m=>m.name==='Fleet of Foot');
  return str + dex + sz + vigour + (fleet ? fleet.rating : 0);
}
function calcDefence(c){
  const dex = getAttrVal(c,'Dexterity');
  const wits = getAttrVal(c,'Wits');
  const base = Math.min(dex, wits);
  const dc = (c.merits||[]).find(m=>m.name==='Defensive Combat');
  const skill = dc && dc.qualifier ? dc.qualifier : 'Athletics';
  return base + (getSkillObj(c,skill).dots||0);
}

function updField(key, val){
  if(editIdx<0) return;
  chars[editIdx][key] = val;
  markDirty();
  // Update header name
  if(key==='name') document.getElementById('edit-charname').textContent = val || 'Unnamed';
}

function updStatus(key, val){
  if(editIdx<0) return;
  if(!chars[editIdx].status) chars[editIdx].status = {};
  chars[editIdx].status[key] = val;
  markDirty();
}

// ── Attributes & Skills Tab ──
function renderAttrsTab(c){
  const el = document.getElementById('et-attrs');
  el.innerHTML = `
    <div class="form-section">
      <div class="form-section-title">Attributes</div>
      <div class="attr-grid">
        ${renderAttrGroup('Mental', ATTR_MENTAL, c)}
        ${renderAttrGroup('Physical', ATTR_PHYSICAL, c)}
        ${renderAttrGroup('Social', ATTR_SOCIAL, c)}
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">Skills</div>
      <div class="skill-grid">
        ${renderSkillGroup('Mental', SKILLS_MENTAL, c)}
        ${renderSkillGroup('Physical', SKILLS_PHYSICAL, c)}
        ${renderSkillGroup('Social', SKILLS_SOCIAL, c)}
      </div>
    </div>
  `;
}

function renderAttrGroup(label, attrs, c){
  const rows = attrs.map(a=>{
    const base = getAttrVal(c, a);
    const bonus = getAttrBonus(c, a);
    return `<div class="attr-row">
      <span class="attr-name">${a}</span>
      <div class="dot-stepper" data-attr="${a}" data-base="${base}" data-bonus="${bonus}">
        ${renderAttrDots(base, bonus, 5, a)}
      </div>
    </div>`;
  }).join('');
  return `<div class="attr-group">
    <div class="attr-group-title">${label}</div>
    ${rows}
  </div>`;
}

function renderAttrDots(base, bonus, max, attr){
  let html = '';
  const total = base + bonus;
  for(let i = 1; i <= max; i++){
    if(i <= base){
      html += `<span class="dot filled" onclick="clickAttrDot('${attr}',${i})">●</span>`;
    } else if(i <= total){
      html += `<span class="dot bonus" onclick="clickAttrDot('${attr}',${i})">●</span>`;
    } else {
      html += `<span class="dot empty" onclick="clickAttrDot('${attr}',${i})">○</span>`;
    }
  }
  // Bonus +/- controls
  html += `<span class="dot empty" style="font-size:12px;color:var(--gdim);margin-left:4px;" onclick="adjAttrBonus('${attr}',1)" title="Add bonus dot">+○</span>`;
  if(bonus > 0){
    html += `<span class="dot empty" style="font-size:12px;color:var(--gdim);" onclick="adjAttrBonus('${attr}',-1)" title="Remove bonus dot">&minus;○</span>`;
  }
  return html;
}

function clickAttrDot(attr, clicked){
  if(editIdx<0) return;
  const c = chars[editIdx];
  const curBase = getAttrVal(c, attr);
  const bonus = getAttrBonus(c, attr);
  // Attributes minimum 1 for vampires
  const newBase = clicked === curBase ? Math.max(1, clicked - 1) : clicked;
  setAttrVal(c, attr, newBase, bonus);
  markDirty();
  renderAttrsTab(c);
}

function adjAttrBonus(attr, delta){
  if(editIdx<0) return;
  const c = chars[editIdx];
  const base = getAttrVal(c, attr);
  let bonus = getAttrBonus(c, attr) + delta;
  if(bonus < 0) bonus = 0;
  setAttrVal(c, attr, base, bonus);
  markDirty();
  renderAttrsTab(c);
}

function renderSkillGroup(label, skills, c){
  const rows = skills.map(s=>{
    const sk = getSkillObj(c, s);
    return renderSkillRow(s, sk, c);
  }).join('');
  return `<div class="skill-group">
    <div class="skill-group-title">${label}</div>
    ${rows}
  </div>`;
}

function renderSkillRow(skill, sk, c){
  const dots = renderSkillDots(sk.dots, sk.bonus||0, 5, skill);
  const nineClass = sk.nine_again ? 'on' : '';
  const specVal = esc((sk.specs||[]).join(', '));
  const showSpec = sk.dots > 0 || (sk.specs && sk.specs.length);
  return `<div class="skill-row">
    <div class="skill-top">
      <span class="skill-name">${skill}</span>
      <div class="skill-flags">
        <span class="skill-flag ${nineClass}" onclick="toggleNineAgain('${skill}')" title="9-Again">9A</span>
        <span class="dot empty" style="font-size:11px;color:var(--gdim);" onclick="adjSkillBonus('${skill}',1)" title="Add bonus dot">+○</span>
        ${(sk.bonus||0)>0?`<span class="dot empty" style="font-size:11px;color:var(--gdim);" onclick="adjSkillBonus('${skill}',-1)" title="Remove bonus dot">&minus;○</span>`:''}
      </div>
      <div class="dot-stepper">
        ${dots}
      </div>
    </div>
    ${showSpec?`<div class="skill-spec">
      <input class="skill-spec-input" placeholder="Specialisation" value="${specVal}" onchange="updSkillSpec('${skill}',this.value)">
    </div>`:''}
  </div>`;
}

function renderSkillDots(base, bonus, max, skill){
  let html = '';
  const total = base + (bonus||0);
  for(let i = 1; i <= Math.max(max, total); i++){
    if(i <= base){
      html += `<span class="dot filled" onclick="clickSkillDot('${skill}',${i})">●</span>`;
    } else if(i <= total){
      html += `<span class="dot bonus" onclick="clickSkillDot('${skill}',${i})">●</span>`;
    } else if(i <= max){
      html += `<span class="dot empty" onclick="clickSkillDot('${skill}',${i})">○</span>`;
    }
  }
  return html;
}

function clickSkillDot(skill, clicked){
  if(editIdx<0) return;
  const c = chars[editIdx];
  const sk = getSkillObj(c, skill);
  // Skills can go to 0
  const newDots = clicked === sk.dots ? Math.max(0, clicked - 1) : clicked;
  sk.dots = newDots;
  setSkillObj(c, skill, sk);
  markDirty();
  renderAttrsTab(c);
}

function toggleNineAgain(skill){
  if(editIdx<0) return;
  const c = chars[editIdx];
  const sk = getSkillObj(c, skill);
  sk.nine_again = !sk.nine_again;
  setSkillObj(c, skill, sk);
  markDirty();
  renderAttrsTab(c);
}

function adjSkillBonus(skill, delta){
  if(editIdx<0) return;
  const c = chars[editIdx];
  const sk = getSkillObj(c, skill);
  sk.bonus = Math.max(0, (sk.bonus||0) + delta);
  setSkillObj(c, skill, sk);
  markDirty();
  renderAttrsTab(c);
}

function updSkillSpec(skill, val){
  if(editIdx<0) return;
  const c = chars[editIdx];
  const sk = getSkillObj(c, skill);
  sk.specs = val ? val.split(/,\s*/).filter(Boolean) : [];
  setSkillObj(c, skill, sk);
  markDirty();
}
