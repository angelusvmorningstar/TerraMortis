<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Mortis — Character Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/editor.css">
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div id="topbar">
  <img class="topbar-logo" id="topbar-logo" alt="">
  <div class="topbar-title">Character Editor</div>
  <div class="topbar-nav">
    <button class="topbar-btn on" onclick="showView('list')" id="nav-list">Characters</button>
    <button class="topbar-btn" onclick="showView('sheet')" id="nav-sheet">Sheet</button>
    <button class="topbar-btn" onclick="showView('edit')" id="nav-edit">Edit</button>
    <button class="topbar-btn" onclick="showView('export')" id="nav-export">Export</button>
  </div>
  <div class="topbar-right">
    <button class="topbar-action green" onclick="syncToSuite()" title="Write tm_chars_db to tm_import_chars for ST Suite">Sync to Suite</button>
    <button class="topbar-action" onclick="saveAll()" id="btn-save">Save All</button>
  </div>
</div>

<!-- ══ VIEWS ══ -->
<div id="app">

  <!-- LIST VIEW -->
  <div class="view active" id="v-list">
    <div class="list-toolbar">
      <input class="list-search" type="text" placeholder="Search characters..." oninput="filterList()">
      <select class="list-filter" id="filter-clan" onchange="filterList()">
        <option value="">All Clans</option>
        <option>Daeva</option><option>Gangrel</option><option>Mekhet</option><option>Nosferatu</option><option>Ventrue</option>
      </select>
      <select class="list-filter" id="filter-cov" onchange="filterList()">
        <option value="">All Covenants</option>
        <option>Carthian Movement</option><option>Circle of the Crone</option><option>Invictus</option><option>Lancea et Sanctum</option>
      </select>
      <span class="list-count" id="list-count"></span>
    </div>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <!-- EDIT VIEW -->
  <div class="view" id="v-edit">
    <div class="edit-header">
      <button class="edit-back" onclick="showView('list')" title="Back to list">&larr;</button>
      <img class="edit-icon" id="edit-clan-icon" alt="" style="display:none">
      <span class="edit-charname" id="edit-charname">No character selected</span>
      <div class="edit-tabs">
        <button class="edit-tab on" onclick="showEditTab('identity')" data-tab="identity">Identity</button>
        <button class="edit-tab" onclick="showEditTab('attrs')" data-tab="attrs">Attributes &amp; Skills</button>
      </div>
      <span class="edit-dirty" id="edit-dirty">UNSAVED</span>
    </div>
    <div class="edit-body" id="edit-body">
      <!-- Identity tab -->
      <div class="etab active" id="et-identity"></div>
      <!-- Attributes & Skills tab -->
      <div class="etab" id="et-attrs"></div>
    </div>
  </div>

  
  <!-- SHEET VIEW -->
  <div class="view" id="v-sheet">
    <div class="sheet-topbar">
      <button onclick="showView('list')">&larr; Back</button>
      <button class="sheet-edit-btn" onclick="editFromSheet()">Edit</button>
    </div>
    <div id="sh-content"></div>
  </div>

  <!-- EXPORT VIEW -->
  <div class="view" id="v-export">
    <div class="export-section">
      <div class="form-section-title">Export &amp; Sync</div>
      <p class="export-desc">
        Export all character data as a CSV matching the 365-column Data Merge schema for Affinity Publisher,
        or sync to the ST Suite's localStorage for immediate use.
      </p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="topbar-action" onclick="downloadCSV()">Download CSV</button>
        <button class="topbar-action green" onclick="syncToSuite()">Sync to ST Suite</button>
      </div>
      <p class="export-desc" style="margin-top:24px;font-size:12px;color:var(--txt3);">
        CSV export is not yet implemented. Sync writes <code>tm_chars_db</code> &rarr; <code>tm_import_chars</code>.
      </p>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</html>
