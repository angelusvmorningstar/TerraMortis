<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terra Mortis — Under Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #0D0B09;
      --surf1: #161310;
      --surf2: #1E1A16;
      --gold1: #C8A84B;
      --gold2: #E0C47A;
      --text:  #D4C9B5;
      --muted: #8A7F6E;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
    }

    .sigil {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 1.5rem;
      color: var(--gold1);
      opacity: 0.6;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--gold2);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .divider {
      border: none;
      border-top: 1px solid #2E2820;
      margin: 2rem auto;
      width: 60%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sigil">&#9760;</div>
    <h1>Terra Mortis</h1>
    <p class="subtitle">Chronicle Management Suite</p>
    <p>The site is currently undergoing maintenance.<br>We will return shortly.</p>
    <hr class="divider">
    <p><em>Memento mori.</em></p>
  </div>
</body>
</html>
