,"effect":"You can respond to a ranged attack by seeking cover up to twice your Speed away.","prereq":"Wits 3, Athletics 2, Brawl 3"},"hard surfaces":{"name":"Hard Surfaces","style":"Close Quarters Combat","rank":"2","effect":"You can smash a Damage grappling manoeuvre into a hard surface, dealing lethal damage and ending the grapple.","prereq":"Wits 3, Athletics 2, Brawl 3"},"armoured coffin":{"name":"Armoured Coffin","style":"Close Quarters Combat","rank":"3","effect":"When you grapple an opponent wearing armour, add their general armour as bonus dice to your roll, and ignore armour when you use the grapple to Damage.\u00a0Incompatible with Hard Surfaces.","prereq":"Wits 3, Athletics 2, Brawl 3"},"prep work":{"name":"Prep Work","style":"Close Quarters Combat","rank":"4","effect":"Take the rote quality to Stealth rolls to launch close combat ambushes.","prereq":"Wits 3, Athletics 2, Brawl 3"},"turnabout":{"name":"Turnabout","style":"Close Quarters Combat","rank":"5","effect":"When you roll to disarm, treat a failure as a success, a success as an exceptional success, and an exceptional success as is plus your opponent takes two bashing damage.","prereq":"Wits 3, Athletics 2, Brawl 3"},"rapid nock":{"name":"Rapid Nock","style":"Combat Archery","rank":"1","effect":"Ignore bow Initiative penalties. String arrows reflexively.","prereq":"Str 3, Athletics 2, Quick Draw (Bow)"},"reflex aiming":{"name":"Reflex Aiming","style":"Combat Archery","rank":"2","effect":"Ignore penalties for firing into close combat.","prereq":"Str 3, Athletics 2, Quick Draw (Bow)"},"parthian shot":{"name":"Parthian Shot","style":"Combat Archery","rank":"3","effect":"When you Dodge, inflict threshold successes as attack damage against the first close attack you beat each turn.","prereq":"Str 3, Athletics 2, Quick Draw (Bow)"},"rain of arrows":{"name":"Rain of Arrows","style":"Combat Archery","rank":"4","effect":"Make medium autofire attacks at triple range penalties.","prereq":"Str 3, Athletics 2, Quick Draw (Bow)"},"trick shot":{"name":"Trick Shot","style":"Combat Archery","rank":"5","effect":"Simultaneously perform a Combat Archery attack and an Athletics action, both at -2.","prereq":"Str 3, Athletics 2, Quick Draw (Bow)"},"establish the duel":{"name":"Establish the Duel","style":"Courtoisie","rank":"1","effect":"Choose an attacker. So long as you don't attack anyone else, add Weaponry as a Defence bonus against outside parties, and deal a point of lethal damage when an outside party enters range.","prereq":"Composure 3, Socialise 2, Weaponry 2, Invictus Status 1"},"value of the spoken word":{"name":"Value of the Spoken Word","style":"Courtoisie","rank":"2","effect":"By goading mid-combat, you may substitute a Social Skill for Athletics or Weaponry, or a Social Attribute for the corresponding Physical Attribute.","prereq":"Composure 3, Socialise 2, Weaponry 2, Invictus Status 1"},"demanding attention":{"name":"Demanding Attention","style":"Courtoisie","rank":"3","effect":"Once you Establish the Duel, if your opponent tries to disengage or attack someone else, you can deal your Socialise dots in lethal damage and leave him Knocked Down.","prereq":"Composure 3, Socialise 2, Weaponry 2, Invictus Status 1"},"shield against sorcery":{"name":"Shield Against Sorcery","style":"Crusade","rank":"1","effect":"While your Defence is fully available, penalise the use of sorcery around you by your Crusade dots.","prereq":"Occult 2, Resolve 3, Weaponry 2, Theban Sorcery 2 or Sorcerous Eunuch, Sanctum Status 1"},"silence":{"name":"Silence","style":"Crusade","rank":"2","effect":"Make called shots to the throat at no penalty to mute someone.","prereq":"Occult 2, Resolve 3, Weaponry 2, Theban Sorcery 2 or Sorcerous Eunuch, Sanctum Status 1"},"a hammer against witches":{"name":"A Hammer Against Witches","style":"Crusade","rank":"3","effect":"Spend Willpower to attack a spellcasting opponent at -2. Success aborts spellcasting and applies the ritual's rating as an additional weapon rating.","prereq":"Occult 2, Resolve 3, Weaponry 2, Theban Sorcery 2 or Sorcerous Eunuch, Sanctum Status 1"},"bless his heart":{"name":"Bless His Heart","style":"Etiquette","rank":"1","effect":"You can use Socialise to calculate Doors.","prereq":"Composure 3, Socialise 2"},"losing your religion":{"name":"Losing Your Religion","style":"Etiquette","rank":"2","effect":"You can take +2 dice and 8-Again to lash out socially, in exchange for worsening your social impression.","prereq":"Composure 3, Socialise 2"},"in high cotton":{"name":"In High Cotton","style":"Etiquette","rank":"3","effect":"Add one relevant Fame or Status Merit to your pool to contest a social interaction.","prereq":"Composure 3, Socialise 2"},"half-cocked":{"name":"Half-Cocked","style":"Etiquette","rank":"4","effect":"When your impression in Social Manoeuvreing is good or better, ignore Resolve and Composure on your first roll against the subject.","prereq":"Composure 3, Socialise 2"},"grace under fire":{"name":"Grace Under Fire","style":"Etiquette","rank":"5","effect":"When you offer an alternative after your Doors have been opened, the opposing player suggests three Conditions, of which you choose one.","prereq":"Composure 3, Socialise 2"},"predator's vigil":{"name":"Predator's Vigil","style":"Falconry","rank":"1","effect":"Your raptor's presence inflicts Shaken on animals its Size or smaller, and lesser predators flee.","prereq":"Wits 3, Animal Ken 3, Bonded Condition"},"flyby":{"name":"Flyby","style":"Falconry","rank":"2","effect":"Your bird contests Presence + Intimidation\u00a0vs Resolve + Composure\u00a0to inflict a -3 action penalty.","prereq":"Wits 3, Animal Ken 3, Bonded Condition"},"retrieve item":{"name":"Retrieve Item","style":"Falconry","rank":"3","effect":"Command your bird to bring you an object. Your bird can make the equivalent of an all-out attack to exceptionally Disarm an opponent.","prereq":"Wits 3, Animal Ken 3, Bonded Condition"},"rake the eyes":{"name":"Rake the Eyes","style":"Falconry","rank":"4","effect":"Your bird attacks at -1 to blind a target.","prereq":"Wits 3, Animal Ken 3, Bonded Condition"},"always be closing":{"name":"Always Be Closing","style":"Fast-Talking","rank":"1","effect":"Ignore one dot of a mark's Resolve or Composure when contested or resisted.","prereq":"Manipulation 3, Subterfuge 2"},"jargon":{"name":"Jargon","style":"Fast-Talking","rank":"2","effect":"Cross-apply one Specialty from another Skill to a given Social roll.","prereq":"Manipulation 3, Subterfuge 2"},"devil's advocacy":{"name":"Devil's Advocacy","style":"Fast-Talking","rank":"3","effect":"Once per scene, reroll a Subterfuge failure.","prereq":"Manipulation 3, Subterfuge 2"},"salting":{"name":"Salting","style":"Fast-Talking","rank":"4","effect":"When you open a Door through conversation, you can spend Willpower to open another.","prereq":"Manipulation 3, Subterfuge 2"},"the nigerian scam":{"name":"The Nigerian Scam","style":"Fast-Talking","rank":"5","effect":"Roll Manipulation + Subterfuge to capitalize on a present mark satisfying their Vice by opening a Door.","prereq":"Manipulation 3, Subterfuge 2"},"shoot first":{"name":"Shoot First","style":"Firefight","rank":"1","effect":"Drawing a gun adds Firearms as an Initiative bonus.","prereq":"Composure 3, Dex 3, Athletics 2, Firearms 2"},"suppressive fire":{"name":"Suppressive Fire","style":"Firefight","rank":"2","effect":"You can lay Covering Fire with a semi-automatic weapon. When you lay Covering Fire, apply your Defence against Firearms attacks, and deny Aim bonuses.","prereq":"Composure 3, Dex 3, Athletics 2, Firearms 2"},"secondary target":{"name":"Secondary Target","style":"Firefight","rank":"3","effect":"You can attack a target with objects bounced by a shot, dealing bashing damage with no weapon rating applied, but ignoring cover.","prereq":"Composure 3, Dex 3, Athletics 2, Firearms 2"},"sprawl":{"name":"Sprawl","style":"Grappling","rank":"1","effect":"Deny a grappling opponent the ability to Drop Prone or Take Cover.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2"},"standing throw":{"name":"Standing Throw","style":"Grappling","rank":"1","effect":"Gain the Knock Down grapple manoeuvre. If used as first/second manoeuvre when establishing grapple, victim can contest Strength + Brawl reflexively; if successful, you're taken down and prone.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2"},"small joint manipulation":{"name":"Small Joint Manipulation","style":"Grappling","rank":"2","effect":"Take -2 to dislocate fingers as a manoeuvre, inflicting half bashing damage and debilitating pain.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2"},"takedown":{"name":"Takedown","style":"Grappling","rank":"2","effect":"Not a grapple manoeuvre; replaces establishing grapple. Knock opponent prone, optionally dealing bashing damage. Exceptional success: free Drop Prone and maintain grapple.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2"},"ippon":{"name":"Ippon","style":"Grappling","rank":"3","effect":"When Takedown or Standing Throw renders opponent prone while you remain standing, double successes for Stunned Tilt. Treated as called shot to head with no penalty.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2; Takedown"},"joint lock":{"name":"Joint Lock","style":"Grappling","rank":"3","effect":"Use Joint Lock in a grapple. If opponent initiates overpower, they take bashing equal to your successes. Can lead into Restrain. Your successful overpowers cause 1L (1B vs Kindred) additional damage.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2"},"dynamic guard":{"name":"Dynamic Guard","style":"Grappling","rank":"4","effect":"When you grapple while prone, penalise your grappling opponent by your Dexterity. Cannot get up from prone in any round this is used.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2"},"lock flow":{"name":"Lock Flow","style":"Grappling","rank":"4","effect":"Take +2 to grappling rolls to set up a Joint Lock.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2; Joint Lock"},"positional dominance":{"name":"Positional Dominance","style":"Grappling","rank":"5","effect":"Grappling manoeuvres deal half their successes in bonus bashing damage.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2"},"tap or snap":{"name":"Tap or Snap","style":"Grappling","rank":"5","effect":"After Joint Lock, force opponent to surrender or suffer broken limb and lethal damage. Characters immune to Beaten Down can contest Manipulation + Subterfuge vs Wits + Empathy to 'accept' without effect. Damage excludes weapon bonus.","prereq":"Sta 3, Str 2, Athletics 2, Brawl 2; Joint Lock"},"sure strike":{"name":"Sure Strike","style":"Heavy Weapons","rank":"1","effect":"Sacrifice up to nine dice (three per point) to add to weapon rating. Pool can't drop below one. Cannot be used while dodging.","prereq":"Sta 3, Str 3, Athletics 2, Weaponry 2"},"threat range":{"name":"Threat Range","style":"Heavy Weapons","rank":"2","effect":"Deal a point of lethal damage and a temporary Defence penalty to opponents who enter range when you aren't moving or Dodging.","prereq":"Sta 3, Str 3, Athletics 2, Weaponry 2"},"bring the pain":{"name":"Bring the Pain","style":"Heavy Weapons","rank":"3","effect":"Sacrifice Defence to make an attack that also inflicts a temporary dice penalty equal to its damage.","prereq":"Sta 3, Str 3, Athletics 2, Weaponry 2"},"warding stance":{"name":"Warding Stance","style":"Heavy Weapons","rank":"4","effect":"Spend Willpower reflexively to apply your weapon rating as close combat Armour.","prereq":"Sta 3, Str 3, Athletics 2, Weaponry 2"},"rending":{"name":"Rending","style":"Heavy Weapons","rank":"5","effect":"Spend Willpower to make an attack that deals an additional point of aggravated damage.","prereq":"Sta 3, Str 3, Athletics 2, Weaponry 2"},"always armed":{"name":"Always Armed","style":"Improvised Weaponry","rank":"1","effect":"Reflexively roll Wits + Weaponry to draw a simple improvised weapon that doesn't suffer the improvisational penalty.","prereq":"Wits 3, Weaponry 1"},"in harm's way":{"name":"In Harm's Way","style":"Improvised Weaponry","rank":"2","effect":"Once per turn, apply an Always Armed weapon's Structure as close combat Armour, potentially damaging the weapon.","prereq":"Wits 3, Weaponry 1"},"breaking point":{"name":"Breaking Point","style":"Improvised Weaponry","rank":"3","effect":"When you make an all-out attack with an Always Armed weapon, sacrifice its Structure to temporarily increase its weapon rating.","prereq":"Wits 3, Weaponry 1"},"detection":{"name":"Detection","style":"K-9","rank":"1","effect":"Under direction, your dog rolls Wits + Survival + K-9 dots (modified for Bonded) to track scent.","prereq":"Wits 3, Animal Ken 3, Bonded Condition"},"targeted bite":{"name":"Targeted Bite","style":"K-9","rank":"2","effect":"Command your dog to make called shots in combat, reducing the shot penalty by -2.","prereq":"Wits 3, Animal Ken 3, Bonded Condition"},"tactical positioning":{"name":"Tactical Positioning","style":"K-9","rank":"3","effect":"When you fight one opponent in tandem, choose roles each turn for you and your dog. One takes +1 Defence, the other +2 to attack. Ignore penalties for firing into melee around your dog.","prereq":"Wits 3, Animal Ken 3, Bonded Condition"},"takedown bite":{"name":"Takedown Bite","style":"K-9","rank":"4","effect":"Command your dog to initiate a biting grapple. Choose Hold or Drop Prone after rolling. Normal Brawling damage applied.","prereq":"Wits 3, Animal Ken 3, Bonded Condition"},"hamstring":{"name":"Hamstring","style":"Kindred Dueling","rank":"1","effect":"You can use a called shot to deny a vampire's limb the benefits of Physical Intensity.","prereq":"Composure 3, Weaponry 2"},"taunt":{"name":"Taunt","style":"Kindred Dueling","rank":"2","effect":"Exchange up to your Weaponry in attack dice to provoke, on hit, a frenzy roll penalised by your exchanged dice.","prereq":"Composure 3, Weaponry 2"},"carving":{"name":"Carving","style":"Kindred Dueling","rank":"3","effect":"Deal lethal damage to the Kindred body.","prereq":"Composure 3, Weaponry 2"},"pincushion":{"name":"Pincushion","style":"Kindred Dueling","rank":"4","effect":"You can lodge your weapon into the victim on a hit, preventing the wound from healing with Vitae use. You can withdraw it reflexively, but others must roll Strength + Stamina - damage caused as an instant action.","prereq":"Composure 3, Weaponry 2"},"spray":{"name":"Spray","style":"Kindred Dueling","rank":"5","effect":"Sacrifice your Defence to make an attack that can exchange points of damage inflicted for points of Vitae damaged.","prereq":"Composure 3, Weaponry 2"},"trained bite":{"name":"Trained Bite","style":"Kino Mutai","rank":"1","effect":"Inflict +2 damage with the Damage grapple manoeuvre when biting, or +1 with inhuman bites.","prereq":"Dex 2, Resolve 3, Brawl 2"},"ripping":{"name":"Ripping","style":"Kino Mutai","rank":"2","effect":"Gain the Ripping grapple manoeuvre: inflict a point of bashing damage and incapacitating pain.","prereq":"Dex 2, Resolve 3, Brawl 2"},"trained gouge":{"name":"Trained Gouge","style":"Kino Mutai","rank":"3","effect":"Gain the Gouge grapple manoeuvre: blind opponent in both eyes while held (as exceptional success Blinded Tilt).","prereq":"Dex 2, Resolve 3, Brawl 2"},"continuous bite":{"name":"Continuous Bite","style":"Kino Mutai","rank":"4","effect":"Inflict lethal damage with Damage grapple manoeuvre when biting. May upgrade two additional successes to lethal vs Kindred; rest is bashing.","prereq":"Dex 2, Resolve 3, Brawl 2"},"rapidity":{"name":"Rapidity","style":"Light Weapons","rank":"1","effect":"Sacrifice your weapon rating to add Weaponry as an Initiative bonus.","prereq":"Wits 3 or Fighting Finesse, Dex 3, Athletics 2, Weaponry 2"},"thrust":{"name":"Thrust","style":"Light Weapons","rank":"2","effect":"Sacrifice points of Defence for bonus attack dice.","prereq":"Wits 3 or Fighting Finesse, Dex 3, Athletics 2, Weaponry 2"},"feint":{"name":"Feint","style":"Light Weapons","rank":"3","effect":"Feinting attack deals no damage. Next turn: ignore Defence equal to (successes + weapon rating) and increase weapon rating by successes.","prereq":"Wits 3 or Fighting Finesse, Dex 3, Athletics 2, Weaponry 2"},"flurry":{"name":"Flurry","style":"Light Weapons","rank":"4","effect":"Inflict a point of lethal damage per turn to opponents in range when your Defence is available.","prereq":"Wits 3 or Fighting Finesse, Dex 3, Athletics 2, Weaponry 2"},"vital shot":{"name":"Vital Shot","style":"Light Weapons","rank":"5","effect":"Sacrifice your Defence to make an attack that deals an additional point of aggravated damage.","prereq":"Wits 3 or Fighting Finesse, Dex 3, Athletics 2, Weaponry 2"},"through the crosshairs":{"name":"Through the Crosshairs","style":"Marksmanship","rank":"1","effect":"Raise your maximum Aim bonus to Composure + Firearms.","prereq":"Composure 3, Resolve 3, Firearms 2"},"precision shot":{"name":"Precision Shot","style":"Marksmanship","rank":"2","effect":"Exchange points of weapon rating for points of penalty reduction for a called shot.","prereq":"Composure 3, Resolve 3, Firearms 2"},"a shot rings out":{"name":"A Shot Rings Out","style":"Marksmanship","rank":"3","effect":"Ignore penalties to strike a surrounded target. Missed shots never hit unintended targets.","prereq":"Composure 3, Resolve 3, Firearms 2"},"ghost":{"name":"Ghost","style":"Marksmanship","rank":"4","effect":"Penalise rolls to notice your vantage point or investigate for evidence of it by your Firearms.","prereq":"Composure 3, Resolve 3, Firearms 2"},"focused attack":{"name":"Focused Attack","style":"Martial Arts","rank":"1","effect":"Reduce called shot penalties by one die, and ignore one point of Armour.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"leg kick":{"name":"Leg Kick","style":"Martial Arts","rank":"1","effect":"Sacrifice a point of Defence to inflict Leg Wrack with a brawling attack.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"cutting elbow":{"name":"Cutting Elbow","style":"Martial Arts","rank":"2","effect":"Make a called shot at -2 to blind an opponent by drawing blood.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"defensive strike":{"name":"Defensive Strike","style":"Martial Arts","rank":"2","effect":"Exchange up to two attack pool dice for points of Defence.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"trapping":{"name":"Trapping","style":"Martial Arts","rank":"3","effect":"You may withdraw successes from a successful attack to hold them in reserve for next turn's attack.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"whirlwind strike":{"name":"Whirlwind Strike","style":"Martial Arts","rank":"3","effect":"Inflict one point of bashing damage per turn, or two by spending Willpower, to opponents in range when your Defence is available.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"inch force":{"name":"Inch Force","style":"Martial Arts","rank":"4","effect":"Reflexively respond to one grapple attempt each turn with a Brawl attack contesting the opponent's Strength. Success breaks free and damages normally.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"the hand as weapon":{"name":"The Hand As Weapon","style":"Martial Arts","rank":"4","effect":"Inflict lethal damage unarmed.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"high momentum strike":{"name":"High Momentum Strike","style":"Martial Arts","rank":"5","effect":"Prepare a counter stance as an instant action. When an opponent first fails to strike you in close combat within the stance, roll a counterattack. Success Knocks Down and deals normal damage plus Brawl damage dice.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"the touch of death":{"name":"The Touch of Death","style":"Martial Arts","rank":"5","effect":"Unarmed strikes gain a 2L weapon rating.","prereq":"Resolve 3, Dex 3, Athletics 2, Brawl 2"},"strike to preempt":{"name":"Strike to Preempt","style":"Mobilise Outrage","rank":"1","effect":"Sacrifice your Defence and your second turn to add your Willpower as bonus dice to attack on your first turn.","prereq":"Willpower 5, Brawl 2, Carthian Status 1"},"unbreakable":{"name":"Unbreakable","style":"Mobilise Outrage","rank":"2","effect":"Add your full Willpower value when spending a point to contest or resist social or mental coercion in a combat situation.","prereq":"Willpower 5, Brawl 2, Carthian Status 1"},"dying on your feet":{"name":"Dying on Your Feet","style":"Mobilise Outrage","rank":"3","effect":"During combat only, ignore wound penalties and do not fall to torpor from injury.","prereq":"Willpower 5, Brawl 2, Carthian Status 1"},"steady saddle":{"name":"Steady Saddle","style":"Mounted Combat","rank":"1","effect":"+3 to stay mounted during combat.","prereq":"Dex 3, Athletics 2, Animal Ken 3"},"fixed charge":{"name":"Fixed Charge","style":"Mounted Combat","rank":"2","effect":"Sacrifice Defence to combine a charge with an all-out attack.","prereq":"Dex 3, Athletics 2, Animal Ken 3"},"skirmishing":{"name":"Skirmishing","style":"Mounted Combat","rank":"3","effect":"Take a -2 attack penalty for +2 Defence and to attack halfway through your mount's movement.","prereq":"Dex 3, Athletics 2, Animal Ken 3"},"rearing beast":{"name":"Rearing Beast","style":"Mounted Combat","rank":"4","effect":"Roll Wits + Animal Ken as teamwork to enhance your mount's attack.","prereq":"Dex 3, Athletics 2, Animal Ken 3"},"flow":{"name":"Flow","style":"Parkour","rank":"1","effect":"Add Parkour dots as automatic successes on movement Athletics rolls. Ignore environmental Athletics penalties equal to Parkour rating.","prereq":"Dex 3, Athletics 2"},"cat leap":{"name":"Cat Leap","style":"Parkour","rank":"2","effect":"Add Parkour dots to Dexterity + Athletics to mitigate falling damage, plus one automatic success. Add Parkour to damage threshold that can be mitigated. Does not apply to terminal velocity. On running jump over low obstacle, add Parkour dots to Athletics.","prereq":"Dex 3, Athletics // ── SHEET RENDER ──
const SORCERY_THEMES = ['Creation','Destruction','Divination','Protection','Transmutation'];
const RITUAL_DISCS = ['Cruac','Theban'];
const CORE_DISCS = ['Animalism','Auspex','Celerity','Dominate','Majesty','Nightmare','Obfuscate','Protean','Resilience','Vigour'];
const COV_ICON_MAP = {
  'carthianmovement':'carthian','circleofthecrone':'crone',
  'invictus':'invictus','lanceaetsanctum':'lance'
};

function dots(n){ return '●'.repeat(Math.max(0,n||0)); }
function dotsWithBonus(base,bonus){
  const b=Math.max(0,base||0),x=Math.max(0,bonus||0);
  if(!x) return dots(b);
  return '●'.repeat(b)+'<span style="color:rgba(220,200,150,.45);letter-spacing:2.5px">○'.repeat(x)+'</span>';
}
function getAttrDots(c,a){
  const raw=c.attributes?c.attributes[a]:0;
  return typeof raw==='object'?(raw.dots||0):(raw||0);
}
function getAttrBonus(c,a){
  const raw=c.attributes?c.attributes[a]:0;
  return typeof raw==='object'?(raw.bonus_dots||0):0;
}
function skillDots(v){ return typeof v==='object'?(v.dots||0):(v||0); }
function skillSpec(v){ return typeof v==='object'?(v.spec||''):''; }

function meritBase(s){ return s.replace(/\s*[●○]+.*/,'').replace(/\s*\|.*/,'').trim(); }
function meritDotCount(s){ return (s.match(/●/g)||[]).length; }
function meritSuffix(s){ const m=s.match(/\|\s*(.+)$/); return m?m[1].trim():null; }
function meritKey(s){ return meritBase(s).toLowerCase(); }
function meritKeyBase(s){ return meritKey(s).replace(/\s*\([^)]*\)\s*/g,'').trim(); }
function meritLookup(s){
  const k=meritKey(s);
  if(MERITS_DB[k]) return MERITS_DB[k];
  // Strip parenthetical qualifier and try again: "library (occult)" -> "library"
  const kb=meritKeyBase(s);
  if(MERITS_DB[kb]) return MERITS_DB[kb];
  return null;
}

function powersForDisc(powers, discName){
  if(SORCERY_THEMES.includes(discName)){
    return powers.filter(p=>p.name.includes('| '+discName)||p.name.startsWith(discName));
  }
  if(RITUAL_DISCS.includes(discName)){
    return powers.filter(p=>p.name.startsWith(discName+' |')||p.name.startsWith(discName+'|')||p.name.includes('| '+discName+' ')||p.name.toLowerCase().startsWith(discName.toLowerCase()+' ●')||p.name.toLowerCase().startsWith(discName.toLowerCase()+'●'));
  }
  return powers.filter(p=>
    p.name===discName||
    p.name.startsWith(discName+' ')||
    p.name.startsWith(discName+'|')
  );
}
function otherPowers(c){
  const all=Object.keys(c.disciplines||{});
  const allSorcery=[...SORCERY_THEMES,...RITUAL_DISCS];
  return (c.powers||[]).filter(p=>!all.some(d=>{
    if(allSorcery.includes(d)){
      if(SORCERY_THEMES.includes(d)) return p.name.includes('| '+d);
      return p.name.startsWith(d+' |')||p.name.startsWith(d+'|')||p.name.includes('| '+d+' ');
    }
    return p.name===d||p.name.startsWith(d+' ')||p.name.startsWith(d+'|');
  }));
}

// ── Toggle expand ──
let openExpId=null;
function toggleExp(id){
  const row=document.getElementById('exp-row-'+id);
  const body=document.getElementById('exp-body-'+id);
  if(!row||!body) return;
  const wasOpen=openExpId===id;
  // Close any open
  if(openExpId!==null){
    const or=document.getElementById('exp-row-'+openExpId);
    const ob=document.getElementById('exp-body-'+openExpId);
    if(or) or.classList.remove('open');
    if(ob) ob.classList.remove('visible');
  }
  openExpId=null;
  if(!wasOpen){
    row.classList.add('open');
    body.classList.add('visible');
    openExpId=id;
  }
}

// ── Toggle discipline drawer ──
function toggleDisc(id){
  const row=document.getElementById('disc-row-'+id);
  const drawer=document.getElementById('disc-drawer-'+id);
  if(!row||!drawer) return;
  const isOpen=row.classList.contains('open');
  row.classList.toggle('open',!isOpen);
  drawer.classList.toggle('visible',!isOpen);
}

// ── Build expandable row HTML ──
function expRow(id, lbl, val, bodyHtml){
  return `<div class="exp-row" id="exp-row-${id}" onclick="toggleExp('${id}')">
    ${lbl?`<span class="exp-lbl labeled">${lbl}</span>`:''}
    <span class="exp-val">${val}</span>
    <span class="exp-arr">›</span>
  </div>
  <div class="exp-body" id="exp-body-${id}">${bodyHtml}</div>`;
}

        ${bl?`<div class="sh-faction-bloodline">${bl}</div>`:''}
        <div class="sh-faction-sub">Clan</div>
      </div>
      <div class="sh-stat-pip">
        <div class="sh-status-shape">${OTHER_SVG}<span class="sh-status-n">${st.clan||0}</span></div>
        <div class="sh-status-lbl">Clan</div>
      </div>
    </div>
  </div>`; // end sh-hdr-right

  html+=`</div></div>`; // end sh-char-body, sh-char-hdr

  // ── COVENANT STRIP ──
  const covS=(c.covenant_standings||[]).slice(1);
  if(covS.length){
    html+=`<div class="cov-strip">`;
    covS.forEach(cs=>{
      const active=cs.status>0;
      html+=`<div class="cov-strip-cell">
        <span class="cov-strip-name${active?' active':''}">${cs.label}</span>
        <span class="cov-strip-dot${active?' active':''}">${active?'○':'–'}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  // ── STATS STRIP ──
  html+=`<div class="sh-stats-strip">
    <div class="sh-stat-cell"><div class="sh-stat-icon">${BP_SVG}<span class="sh-stat-n">${c.blood_potency||1}</span></div><div class="sh-stat-lbl">BP</div></div>
    <div class="sh-stat-cell"><div class="sh-stat-icon">${HUM_SVG}<span class="sh-stat-n">${c.humanity||0}</span></div><div class="sh-stat-lbl">Humanity</div></div>
    <div class="sh-stat-cell"><div class="sh-stat-icon">${STAT_SVG}<span class="sh-stat-n">${c.size||5}</span></div><div class="sh-stat-lbl">Size</div></div>
    <div class="sh-stat-cell"><div class="sh-stat-icon">${STAT_SVG}<span class="sh-stat-n">${c.speed||0}</span></div><div class="sh-stat-lbl">Speed</div></div>
    <div class="sh-stat-cell"><div class="sh-stat-icon">${STAT_SVG}<span class="sh-stat-n">${c.defence||0}</span></div><div class="sh-stat-lbl">Defence</div></div>
  </div>`;

  // ── TRACKERS ──
  const maxV=9+(c.blood_potency||1);
  const maxWP=(getAttrDots(c,'Resolve')||0)+(getAttrDots(c,'Composure')||0);
  const infl=c.influence||[];
  const maxInf=infl.reduce((s,x)=>s+(x.dots||0),0);

  // Load or seed persisted state
  const tKey='tm_tracker_'+c.name;
  let tState;
  try{ tState=JSON.parse(localStorage.getItem(tKey)||'null'); }catch(e){ tState=null; }
  if(!tState) tState={vitae:maxV, wp:maxWP, inf:maxInf};
  tState.vitae=Math.max(0,Math.min(tState.vitae,maxV));
  tState.wp=Math.max(0,Math.min(tState.wp,maxWP));
  tState.inf=Math.max(0,Math.min(tState.inf,maxInf));
  // Always write back so toggleBox can read it
  localStorage.setItem(tKey, JSON.stringify(tState));

  function mkBoxRow(type, current, max, filledCls){
    const disp=Math.min(max,15);
    const boxes=Array.from({length:disp},(_,i)=>{
      const filled=i<current;
      return `<div class="tbox${filled?' '+filledCls:''}" data-tracker="${type}" data-idx="${i}" data-max="${disp}" data-filled="${filledCls}"></div>`;
    }).join('');
    return `<div class="sh-tracker-row">
      <div class="sh-tracker-lbl">${type==='vitae'?'Vitae':type==='wp'?'Willpower':'Influence'}</div>
      <div class="sh-tracker-boxes" id="tb-${type}">${boxes}</div>
      <div class="sh-tracker-num" id="tn-${type}">${current}/${max}</div>
    </div>`;
  }

  html+=`<div class="sh-tracker-block" id="tracker-block">
    ${mkBoxRow('vitae',tState.vitae,maxV,'vitae-filled')}
    ${mkBoxRow('wp',tState.wp,maxWP,'wp-filled')}
    ${maxInf>0?mkBoxRow('inf',tState.inf,maxInf,'inf-filled'):''}
  </div>`;

  // ── BODY ──
  html+=`<div class="sh-body">`;

  // Attributes (column-first: Mental/Physical/Social)
  const ATTR_ROWS=[
    ['Intelligence','Strength','Presence'],
    ['Wits','Dexterity','Manipulation'],
    ['Resolve','Stamina','Composure'],
  ];
  html+=`<div class="sh-sec"><div class="sh-sec-title">Attributes</div><div class="attr-grid">`;
  ATTR_ROWS.forEach(row=>row.forEach(a=>{
    const base=getAttrDots(c,a),bonus=getAttrBonus(c,a);
    html+=`<div class="attr-cell"><div class="attr-name">${a}</div><div class="attr-dots">${dotsWithBonus(base,bonus)}</div></div>`;
  }));
  html+=`</div></div>`;

  // Skills (3-col, all 24)
  const SKILL_COLS=[
    ['Academics','Computer','Crafts','Investigation','Medicine','Occult','Politics','Science'],
    ['Athletics','Brawl','Drive','Firearms','Larceny','Stealth','Survival','Weaponry'],
    ['Animal Ken','Empathy','Expression','Intimidation','Persuasion','Socialise','Streetwise','Subterfuge'],
  ];
  html+=`<div class="sh-sec"><div class="sh-sec-title">Skills</div><div class="skills-3col">`;
  for(let ri=0;ri<8;ri++){
    SKILL_COLS.forEach(col=>{
      const s=col[ri];
      const sk=c.skills?c.skills[s]:null;
      const d=skillDots(sk), sp=skillSpec(sk);
      const bn=typeof sk==='object'?(sk.bonus_dots||0):0;
      const na=typeof sk==='object'&&sk.nine_again;
      const hasDots=d>0||bn>0;
      const dotStr=hasDots?dotsWithBonus(d,bn):'–';
      html+=`<div class="skill-row${hasDots?' has-dots':''}">
        <div class="skill-name-wrap">
          <span class="skill-name">${s}</span>
          ${sp?`<span class="skill-spec">${sp}</span>`:''}
        </div>
        <div class="skill-dots-wrap">
          <span class="${hasDots?'skill-dots':'skill-zero'}">${dotStr}</span>
          ${na?`<span class="skill-na">9-Again</span>`:''}
        </div>
      </div>`;
    });
  }
  html+=`</div></div>`;

  // ── Powers — four sections ──
  if(c.disciplines&&Object.keys(c.disciplines).length){

    function renderDiscRow(d, r, nameStyle){
      const discPowers=powersForDisc(c.powers||[],d);
      const hasPowers=discPowers.length>0;
      const id='disc-'+c.name.replace(/[^a-z]/gi,'')+d.replace(/[^a-z]/gi,'');
      let drawerHtml='';
      discPowers.forEach(p=>{
        const pname=p.name.includes('|')?p.name.split('|')[1].trim():p.name;
        drawerHtml+=`<div class="disc-power">
          <div class="disc-power-name">${pname}</div>
          ${p.stats?`<div class="disc-power-stats">${p.stats}</div>`:''}
          <div class="disc-power-effect">${p.effect||''}</div>
        </div>`;
      });
      const nameTag=(nameStyle?'<span class="disc-tap-name" style="'+nameStyle+'">':'<span class="disc-tap-name">')+d+'</span>';
      const dotsTag=r?`<span class="disc-tap-dots">${dots(r)}</span>`:'';
      if(!hasPowers){
        return `<div class="disc-tap-row">
          <div class="disc-tap-left">${nameTag}${dotsTag}</div>
        </div>`;
      }
      return `<div class="disc-tap-row" id="disc-row-${id}" onclick="toggleDisc('${id}')">
          <div class="disc-tap-left">${nameTag}${dotsTag}</div>
          <span class="disc-tap-arr">›</span>
        </div>
        <div class="disc-drawer" id="disc-drawer-${id}">${drawerHtml}</div>`;
    }

    const discEntries=Object.entries(c.disciplines);
    const coreDiscs=discEntries.filter(([d])=>CORE_DISCS.includes(d));
    const ritualDiscs=discEntries.filter(([d])=>RITUAL_DISCS.includes(d));
    const themeDiscs=discEntries.filter(([d])=>SORCERY_THEMES.includes(d));

    // 1. Disciplines
    if(coreDiscs.length){
      html+=`<div class="sh-sec"><div class="sh-sec-title">Disciplines</div><div class="disc-list">`;
      coreDiscs.forEach(([d,r])=>{ html+=renderDiscRow(d,r,null); });
      html+=`</div></div>`;
    }

    // 2. Devotions
    const others=otherPowers(c);
    const devotions=others.filter(p=>p.name.trim().startsWith('Devotion'));
    if(devotions.length){
      html+=`<div class="sh-sec"><div class="sh-sec-title">Devotions</div><div class="disc-list">`;
      devotions.forEach((p,i)=>{
        const pname=p.name.includes('|')?p.name.split('|')[1].trim():p.name.replace(/^Devotion\s*\|\s*/i,'');
        const gid='dev'+c.name.replace(/[^a-z]/gi,'')+i;
        html+=`<div class="disc-tap-row" id="disc-row-${gid}" onclick="toggleDisc('${gid}')">
          <div class="disc-tap-left"><span class="disc-tap-name" style="color:var(--txt2)">${pname}</span></div>
          <span class="disc-tap-arr">›</span>
        </div>
        <div class="disc-drawer" id="disc-drawer-${gid}">
          <div class="disc-power">
            ${p.stats?`<div class="disc-power-stats">${p.stats}</div>`:''}
            <div class="disc-power-effect">${p.effect||''}</div>
          </div>
        </div>`;
      });
      html+=`</div></div>`;
    }

    // 3. Blood Sorcery (Cruac, Theban, then themes)
    if(ritualDiscs.length||themeDiscs.length){
      html+=`<div class="sh-sec"><div class="sh-sec-title">Blood Sorcery</div><div class="disc-list">`;
      ritualDiscs.forEach(([d,r])=>{ html+=renderDiscRow(d,r,'color:rgba(220,160,120,.9)'); });
      if(themeDiscs.length){
        html+=`<div class="disc-sub-head">Themes</div>`;
        themeDiscs.forEach(([d,r])=>{ html+=renderDiscRow(d,r,'color:rgba(220,160,120,.75)'); });
      }
      html+=`</div></div>`;
    }

    // 4. Pacts (Oaths + Carthian Law)
    const pacts=others.filter(p=>!p.name.trim().startsWith('Devotion'));
    if(pacts.length){
      html+=`<div class="sh-sec"><div class="sh-sec-title">Pacts</div><div class="disc-list">`;
      pacts.forEach((p,i)=>{
        const gid='pact'+c.name.replace(/[^a-z]/gi,'')+i;
        html+=`<div class="disc-tap-row" id="disc-row-${gid}" onclick="toggleDisc('${gid}')">
          <div class="disc-tap-left"><span class="disc-tap-name" style="color:var(--txt2)">${p.name}</span></div>
          <span class="disc-tap-arr">›</span>
        </div>
        <div class="disc-drawer" id="disc-drawer-${gid}">
          <div class="disc-power">
            ${p.stats?`<div class="disc-power-stats">${p.stats}</div>`:''}
            <div class="disc-power-effect">${p.effect||''}</div>
          </div>
        </div>`;
      });
      html+=`</div></div>`;
    }
  }

  // ── Influence Merits ──
  const inflNew=c.influence||[];
  if(inflNew.length){
    // Group by type
    const inflGroups={};
    inflNew.forEach(x=>{
      const t=x.type||'Influence';
      if(!inflGroups[t]) inflGroups[t]=[];
      inflGroups[t].push(x);
    });
    html+=`<div class="sh-sec"><div class="sh-sec-title">Influence Merits</div><div class="merit-list">`;
    let inflIdx=0;
    inflNew.forEach(x=>{
      const area=(x.area&&x.area.trim())?x.area.trim():null;
      const mStr=(area?`${x.type} (${area})`:x.type)+(x.dots?' '+dots(x.dots):'');
      html+=renderMeritRow(mStr,'infl',inflIdx++);
    });
    html+=`</div></div>`;
  }

  // ── Domain Merits ──
  const dom=c.domain||{};
  const domEntries=[
    {key:'safe_place',label:'Safe Place'},
    {key:'haven',label:'Haven'},
    {key:'feeding_grounds',label:'Feeding Grounds'},
    {key:'herd',label:'Herd'},
  ].filter(e=>dom[e.key]);
  if(domEntries.length){
    html+=`<div class="sh-sec"><div class="sh-sec-title">Domain Merits</div><div class="merit-list">`;
    domEntries.forEach(e=>{
      html+=`<div class="merit-plain"><span class="merit-name">${e.label}</span><span class="merit-dots">${dots(dom[e.key])}</span></div>`;
    });
    html+=`</div></div>`;
  }

  // ── Standing Merits ──
  const stnd=c.standing||{};
  const hasMC=stnd.mystery_cult&&stnd.mystery_cult.dots;
  const hasPT=stnd.prof_training&&stnd.prof_training.dots;
  if(hasMC||hasPT){
    html+=`<div class="sh-sec"><div class="sh-sec-title">Standing Merits</div><div class="stand-list">`;
    if(hasMC){
      html+=`<div class="stand-row">
        <div class="stand-name-row"><span class="stand-label">Mystery Cult Initiation</span><span class="stand-dots">${dots(stnd.mystery_cult.dots)}</span></div>
        ${stnd.mystery_cult.name?`<div class="stand-sub">${stnd.mystery_cult.name}</div>`:''}
      </div>`;
    }
    if(hasPT){
      html+=`<div class="stand-row">
        <div class="stand-name-row"><span class="stand-label">Professional Training</span><span class="stand-dots">${dots(stnd.prof_training.dots)}</span></div>
        ${stnd.prof_training.role?`<div class="stand-sub">${stnd.prof_training.role}</div>`:''}
      </div>`;
    }
    html+=`</div></div>`;
  }

  // ── Other Merits + Manoeuvres ──
  const allMerits=c.merits||[];
  const DOMAIN_NAMES=['Safe Place','Haven','Feeding Grounds','Herd'];
  const STD_NAMES=['Mystery Cult','Mystery Cult Initiation','Professional Training','Prof. Training'];

  function isMeritDomain(s){ return DOMAIN_NAMES.some(d=>meritBase(s)===d); }
  function isMeritStanding(s){ return STD_NAMES.some(d=>meritBase(s).startsWith(d)); }
  function isMeritManoeuvre(s){
    const suf=meritSuffix(s);
    return !!(suf&&MAN_DB[suf.toLowerCase()]);
  }

  const otherMerits=allMerits.filter(m=>!isMeritDomain(m)&&!isMeritStanding(m)&&!isMeritManoeuvre(m));
  const manMerits=allMerits.filter(m=>isMeritManoeuvre(m));

  function renderMeritRow(m, idPrefix, i){
    const base=meritBase(m);
    const dcnt=meritDotCount(m);
    const dotsStr=dcnt?dots(dcnt):'';
    const parenMatch=base.match(/^([^(]+?)\s*\((.+)\)$/);
    const mainName=parenMatch?parenMatch[1].trim():base;
    const subName=parenMatch?parenMatch[2].trim():null;
    const nameHtml=subName
      ?`<div class="merit-name">${mainName}</div><div class="merit-sub">${subName}</div>`
      :`<div class="merit-name">${mainName}</div>`;
    const key=meritKey(m);
    const db=meritLookup(m);
    const dotsTag=dotsStr?`<span class="merit-dots">${dotsStr}</span>`:'';
    if(db&&db.desc){
      const id=idPrefix+i;
      const body=`<div>${db.desc}</div>${db.prereq?`<div style="margin-top:5px;font-style:italic;color:var(--txt3)">Prerequisite: ${db.prereq}</div>`:''}`;
      return `<div class="exp-row" id="exp-row-${id}" onclick="toggleExp('${id}')">
        <div style="flex:1;min-width:0">${nameHtml}</div>
        ${dotsTag}<span class="exp-arr">›</span>
      </div>
      <div class="exp-body" id="exp-body-${id}">${body}</div>`;
    } else {
      return `<div class="merit-plain">
        <div style="flex:1;min-width:0">${nameHtml}</div>${dotsTag}
      </div>`;
    }
  }

  if(otherMerits.length){
    html+=`<div class="sh-sec"><div class="sh-sec-title">Merits</div><div class="merit-list">`;
    otherMerits.forEach((m,i)=>{ html+=renderMeritRow(m,'merit',i); });
    html+=`</div></div>`;
  }

  if(manMerits.length){
    html+=`<div class="sh-sec"><div class="sh-sec-title">Manoeuvres</div><div class="man-list">`;
    manMerits.forEach((m,i)=>{
      const suf=meritSuffix(m);
      const base=meritBase(m);
      const rank=meritDotCount(m);
      const db=suf?MAN_DB[suf.toLowerCase()]:null;
      const id='man'+i;
      const body=db?`<div class="man-exp-body">
        <div class="man-style">${db.style} — Rank ${db.rank}</div>
        <div>${db.effect||''}</div>
        ${db.prereq?`<div class="man-prereq">Prerequisite: ${db.prereq}</div>`:''}
      </div>`:`<div>${suf||m}</div>`;
      html+=`<div class="exp-row" id="exp-row-${id}" onclick="toggleExp('${id}')">
        <div style="flex:1;min-width:0">
          <div class="merit-name">${suf||base}</div>
          <div class="merit-sub">${base} — Rank ${rank}</div>
        </div>
        <span class="exp-arr">›</span>
      </div>
      <div class="exp-body" id="exp-body-${id}">${body}</div>`;
    });
    html+=`</div></div>`;
  }

  html+=`</div>`; // end sh-body
  el.innerHTML=html;
}




// ── TRACKER TOGGLE ──
// Event delegation on tracker-block — avoids inline onclick and string-escaping issues
document.addEventListener('click', function(e){
  const box = e.target.closest('[data-tracker]');
  if(!box) return;
  const block = box.closest('#tracker-block');
  if(!block) return;

  const type = box.dataset.tracker;
  const idx  = parseInt(box.dataset.idx);
  const max  = parseInt(box.dataset.max);
  const filledCls = box.dataset.filled;

  // Resolve the tKey from the currently displayed character
  if(!sheetChar) return;
  const tKey = 'tm_tracker_' + sheetChar.name;
  let state;
  try{ state = JSON.parse(localStorage.getItem(tKey)||'null'); }catch(e){ state=null; }
  if(!state) return;

  const current = state[type];
  // Tap filled → spend down to idx; tap empty → recover up to idx+1
  state[type] = idx < current ? idx : idx + 1;
  state[type] = Math.max(0, Math.min(state[type], max));
  localStorage.setItem(tKey, JSON.stringify(state));

  // Re-render boxes
  const boxesEl = document.getElementById('tb-'+type);
  const numEl   = document.getElementById('tn-'+type);
  if(boxesEl){
    boxesEl.innerHTML = Array.from({length:max},(_,i)=>{
      const filled = i < state[type];
      return `<div class="tbox${filled?' '+filledCls:''}" data-tracker="${type}" data-idx="${i}" data-max="${max}" data-filled="${filledCls}"></div>`;
    }).join('');
  }
  // num shows true max (might exceed 15 display boxes for influence)
  const trueMax = type==='vitae'?(9+(sheetChar.blood_potency||1))
                : type==='wp'?((sheetChar.attributes&&(sheetChar.attributes['Resolve']||0)+(sheetChar.attributes['Composure']||0))||max)
                : (sheetChar.influence||[]).reduce((s,x)=>s+(x.dots||0),0);
  if(numEl) numEl.textContent = state[type]+'/'+trueMax;
});

function parseResistance(r){
  if(!r) return null;
  r=r.trim();
  let mode,rest;
  if(r.startsWith('v ')){ mode='v'; rest=r.slice(2).trim(); }
  else if(r.startsWith('- ')){ mode='-'; rest=r.slice(2).trim(); }
  else return null;
  rest=rest.replace(/^highest\s+/i,'').replace(/\w+'\s*s\s+/,'');
  const ATTRS=['Intelligence','Wits','Resolve','Presence','Manipulation','Composure','Strength','Dexterity','Stamina'];
  const SKILLS=['Athletics','Brawl','Drive','Firearms','Larceny','Stealth','Survival','Weaponry','Animal Ken','Empathy','Expression','Intimidation','Persuasion','Socialise','Socialize','Streetwise','Subterfuge','Academics','Computer','Crafts','Investigation','Medicine','Occult','Politics','Science'];
  const DISC_ABBR={'Obf':'Obfuscate','Aus':'Auspex','Dom':'Dominate','Cel':'Celerity','Maj':'Majesty','Nig':'Nightmare','Pro':'Protean','Res':'Resilience','Vig':'Vigour','Ani':'Animalism','Cru':'Cruac','The':'Theban'};
  const tokens=rest.split('+').map(s=>s.trim()).filter(Boolean).map(p=>{
    if(p==='BP'||p==='Blood Potency') return {label:'BP',key:'blood_potency',type:'bp'};
    if(p==='Humanity') return {label:'Humanity',key:'humanity',type:'humanity'};
    if(ATTRS.includes(p)) return {label:p,key:p,type:'attr'};
    if(SKILLS.includes(p)) return {label:p,key:p,type:'skill'};
    if(DISC_ABBR[p]) return {label:DISC_ABBR[p],key:DISC_ABBR[p],type:'disc'};
    return {label:p,key:p,type:'attr'};
  });
  return {mode,tokens};
}
function getResistTokenVal(c,tok){
  if(!c) return 0;
  if(tok.type==='bp') return c.blood_potency||0;
  if(tok.type==='humanity') return c.humanity||0;
  if(tok.type==='attr'){ const v=c.attributes?.[tok.key]; return typeof v==='object'?v.dots:v||0; }
  if(tok.type==='skill'){ const v=c.skills?.[tok.key]; return typeof v==='object'?v.dots:v||0; }
  if(tok.type==='disc') return c.disciplines?.[tok.key]||0;
  return 0;
}
function showResistSec(){
  const sec=document.getElementById('resist-sec');
  if(!sec) return;
  const r=POOL_INFO?.resistance;
  RESIST_CHAR=null; RESIST_VAL=0; RESIST_MODE=null;
  if(!r){ sec.style.display='none'; return; }
  const parsed=parseResistance(r);
  if(!parsed){ sec.style.display='none'; return; }
  RESIST_MODE=parsed.mode;
  sec.style.display='';
  const lbl=document.getElementById('resist-lbl');
  if(lbl) lbl.textContent=parsed.mode==='v'?'Resistance — '+r:'Resistance — '+r;
  const sel=document.getElementById('resist-sel');
  const cur=sel.value;
  sel.innerHTML='<option value="">— select target —</option>';
  (window._charNames||[]).slice().sort().forEach(n=>{
    const opt=document.createElement('option');
    opt.value=n; opt.textContent=n;
    if(n===cur) opt.selected=true;
    sel.appendChild(opt);
  });
  updResist();
}
function updResist(){
  const sel=document.getElementById('resist-sel');
  const name=sel?.value||'';
  RESIST_CHAR=name?chars.find(c=>c.name===name)||null:null;
  const r=POOL_INFO?.resistance;
  const parsed=r?parseResistance(r):null;
  const line=document.getElementById('resist-line');
  if(!parsed||!RESIST_CHAR){ RESIST_VAL=0; if(line) line.innerHTML=''; updPool(); return; }
  const parts=parsed.tokens.map(t=>({...t,val:getResistTokenVal(RESIST_CHAR,t)}));
  RESIST_VAL=parts.reduce((s,t)=>s+t.val,0);
  if(line){
    const breakdown=parts.map(t=>`${t.label} <b>${t.val}</b>`).join(' + ');
    if(parsed.mode==='v'){
      line.innerHTML=`${breakdown} = <span class="rv-win">${RESIST_VAL} dice</span>`;
    } else {
      line.innerHTML=`${breakdown} = <span class="rv-pen">−${RESIST_VAL} to pool</span>`;
    }
  }
  updPool();
}
function effPool(){ return RESIST_MODE==='-'?Math.max(0,PS+MOD-RESIST_VAL):PS+MOD; }
function chgPool(d){PS=Math.max(-5,Math.min(40,PS+d));updPool();}
function chgMod(d){MOD=Math.max(-10,Math.min(10,MOD+d));updPool();}
function updPool(){
  const eff=effPool();
  const pv=document.getElementById('pval');
  pv.textContent=PS<=0?'Chance':PS;
  pv.className='cval'+(PS<=0?' chance':'');
  const mv=document.getElementById('mval');
  mv.textContent=MOD===0?'0':MOD>0?'+'+MOD:MOD;
  mv.className='bval'+(MOD>0?' pos':MOD<0?' neg':'');
  const el=document.getElementById('effline');
  if(!POOL_INFO||!POOL_INFO.attr){
    if(eff<=0) el.innerHTML='Effective pool: <span style="color:#E8A0A0;">Chance die</span>';
    else el.innerHTML='Effective pool: <span>'+eff+(eff===1?' die':' dice')+'</span>';
    return;
  }
  const pi=POOL_INFO;
  const segs=[];
  if(pi.attr) segs.push('<span class="effpool-seg">'+pi.attr+' <b>'+pi.attrV+'</b></span>');
  if(pi.skill) segs.push('<span class="effpool-seg">'+pi.skill+' <b>'+pi.skillV+'</b></span>');
  if(pi.discName&&pi.discV) segs.push('<span class="effpool-seg">'+pi.discName+' <b>'+pi.discV+'</b></span>');
  if(RESIST_MODE==='-'&&RESIST_VAL>0) segs.push('<span class="effpool-seg" style="color:#A8C4E0;">−Resist <b>'+RESIST_VAL+'</b></span>');
  let html=segs.join('<span class="effpool-sep"> + </span>');
  if(pi.skill&&rollChar){
    const sk=rollChar.skills?rollChar.skills[pi.skill]:null;
    const spec=sk&&typeof sk==='object'?sk.spec:'';
    const na=sk&&typeof sk==='object'&&sk.nine_again;
    if(spec){
      const specList=spec.split(',').map(s=>s.trim()).filter(Boolean);
      html+='<div class="effpool-specs">'+specList.map(s=>'<span class="effpool-spec">'+s+' <span class="effpool-spec-bonus">+'+(na?'2 (9-again)':'1')+'</span></span>').join('')+'</div>';
    }
  }
  el.innerHTML=html;
}
function setAgain(v){AGAIN=v;[8,9,10].forEach(n=>document.getElementById('a'+n).classList.toggle('on',n===v));}
function togMod(m){
  if(m==='rote'){ROTE=!ROTE;document.getElementById('rote-c').classList.toggle('on',ROTE);}
  else{NA=!NA;document.getElementById('na-c').classList.toggle('on',NA);}
}
function d10(){return Math.floor(Math.random()*10)+1;}
function mkDie(v){return{v,s:v>=8,x:!NA&&v>=AGAIN};}
function mkChain(rv){const r=mkDie(rv),ch=[];if(!NA){let l=r;while(l.x){const c=mkDie(d10());ch.push(c);l=c;}}return{r,ch};}
function rollPool(n){const c=[];for(let i=0;i<n;i++)c.push(mkChain(d10()));return c;}
function cntSuc(cols){let s=0;cols.forEach(col=>{if(col.r.s)s++;col.ch.forEach(d=>{if(d.s)s++;});});return s;}
function mkDieEl(d,delay,isX){
  const el=document.createElement('div');
  let cls=isX?'die ed':(d.s?'die sd':'die fd');
  if(d.x) cls+=' xd';
  el.className=cls;el.textContent=d.v;
  el.style.animationDelay=(delay*40)+'ms';
  return el;
}
function mkColsEl(cols,base){
  const w=document.createElement('div');w.style.cssText='display:flex;flex-wrap:wrap;gap:5px;';
  let delay=base;
  cols.forEach(col=>{
    const ce=document.createElement('div');ce.className='dcol';
    ce.appendChild(mkDieEl(col.r,delay++,false));
    col.ch.forEach(child=>{
      const conn=document.createElement('div');conn.className='xconn';
      ce.appendChild(conn);ce.appendChild(mkDieEl(child,delay++,true));
    });
    w.appendChild(ce);
  });
  return w;
}
function doRoll(){
  const eff=effPool();
  const area=document.getElementById('dice-area');
  const hdr=document.getElementById('res-hdr');
  area.innerHTML='';hdr.classList.remove('on');
  if(eff<=0){
    const v=d10(),suc=v===10,dram=v===1;
    const cls=dram?'d':suc?'e':'f';
    const lbl=dram?'Dramatic Failure':suc?'Success (Chance)':'Failure (Chance)';
    const cnt=dram?'—':suc?'1':'0';
    hdr.innerHTML=`<div><span class="rcnt ${cls}">${cnt}</span><span class="rlbl ${cls}">${lbl}</span></div><div class="rverd">Chance die</div>`;
    hdr.classList.add('on');
    const del=document.createElement('div');del.className='die cd';del.textContent=v;area.appendChild(del);
    addHist('Chance',cls,lbl,cnt,'Chance die');return;
  }
  let cA=rollPool(eff),cB=ROTE?rollPool(eff):null;
  let sA=cntSuc(cA),sB=ROTE?cntSuc(cB):0;
  let wC,wS,lC,lS;
  if(ROTE&&sB>sA){wC=cB;wS=sB;lC=cA;lS=sA;}
  else{wC=cA;wS=sA;if(ROTE){lC=cB;lS=sB;}}
  const mods=[];if(ROTE)mods.push('rote');if(NA)mods.push('no again');
  let verdParts=[];
  if(POOL_INFO&&POOL_INFO.attr){
    const pi=POOL_INFO;
    if(pi.attr) verdParts.push(pi.attr+' '+pi.attrV);
    if(pi.skill) verdParts.push(pi.skill+' '+pi.skillV);
    if(pi.discName&&pi.discV) verdParts.push(pi.discName+' '+pi.discV);
  }
  const poolStr=verdParts.length?verdParts.join(' + '):eff+'d10';
  const verd=`${poolStr} · ${AGAIN}-again${mods.length?' · '+mods.join(', '):''}`;

  // Contested roll
  if(RESIST_MODE==='v'&&RESIST_CHAR&&RESIST_VAL>0){
    const cR=rollPool(RESIST_VAL);
    const sR=cntSuc(cR);
    const net=wS-sR;
    const won=net>0;
    const draw=net===0;
    const cls=won?(net>=5?'e':'s'):'f';
    const outcome=won?(net>=5?'Exceptional Success':'Success'):draw?'Draw (Failure)':'Failure';
    hdr.innerHTML=`<div><span class="rcnt ${cls}">${won?net:wS}</span><span class="rlbl ${cls}">${outcome}</span></div><div class="rverd">${poolStr} vs ${RESIST_CHAR.name.split(' ')[0]} ${POOL_INFO.resistance} · ${wS} vs ${sR}</div>`;
    hdr.classList.add('on');
    const wb=document.createElement('div');wb.className='rote-blk win';
    wb.innerHTML=`<div class="rote-lbl">${rollChar?rollChar.name.split(' ')[0]:'Roll'} — ${wS} success${wS!==1?'es':''}</div>`;
    wb.appendChild(mkColsEl(wC,0));area.appendChild(wb);
    const rb=document.createElement('div');rb.className='rote-blk'+(won?'':' win');
    rb.innerHTML=`<div class="rote-lbl">${RESIST_CHAR.name.split(' ')[0]} (resistance) — ${sR} success${sR!==1?'es':''}</div>`;
    rb.appendChild(mkColsEl(cR,wC.length+2));area.appendChild(rb);
    addHist(eff+'d10',cls,outcome,won?net:wS,verd);
    return;
  }

  const exc=wS>=5;
  const cls=wS===0?'f':exc?'e':'s';
  const lbl=wS===0?'Failure':exc?'Exceptional Success':'Success';
  hdr.innerHTML=`<div><span class="rcnt ${cls}">${wS}</span><span class="rlbl ${cls}">${lbl}</span></div><div class="rverd">${verd}</div>`;
  hdr.classList.add('on');
  if(ROTE){
    const wb=document.createElement('div');wb.className='rote-blk win';
    wb.innerHTML=`<div class="rote-lbl">Roll 1 — ${wS} success${wS!==1?'es':''} (selected)</div>`;
    wb.appendChild(mkColsEl(wC,0));area.appendChild(wb);
    const lb=document.createElement('div');lb.className='rote-blk';
    lb.innerHTML=`<div class="rote-lbl">Roll 2 — ${lS} success${lS!==1?'es':''}</div>`;
    lb.appendChild(mkColsEl(lC,wC.length+2));area.appendChild(lb);
  } else {
    area.appendChild(mkColsEl(wC,0));
  }
  addHist(eff+'d10',cls,lbl,wS,verd);
}
function addHist(pool,cls,lbl,cnt,verd){
  hist.unshift({pool,lbl,cnt,cls,verd});
  if(hist.length>20) hist.pop();
  renderHist();
}
function renderHist(){
  const l=document.getElementById('hlist');
  if(!hist.length){l.innerHTML='<div class="hempty">No rolls yet</div>';return;}
  l.innerHTML=hist.map(r=>`<div class="hitem"><span class="hmeta">${r.verd}</span><span class="hres ${r.cls}">${r.cnt} ${r.lbl}</span></div>`).join('');
}
function clrHist(){hist=[];renderHist();}

function stMaxVitae(c){ return 9+(c.blood_potency||1); }
function stMaxWP(c){ const a=c.attributes||{}; return (a['Resolve']||0)+(a['Composure']||0); }
function stMaxInf(c){ return (c.influence||[]).reduce((s,x)=>s+(x.dots||0),0); }

function stGetTracker(c){
  const key='tm_tracker_'+c.name;
  try{ const s=JSON.parse(localStorage.getItem(key)||'null'); if(s) return s; }catch(e){}
  return {vitae:0, wp:stMaxWP(c), inf:stMaxInf(c)};
}
function stSetTracker(c, state){
  localStorage.setItem('tm_tracker_'+c.name, JSON.stringify(state));
}

function stGetDt(c){
  try{ return JSON.parse(localStorage.getItem('tm_dt_'+c.name)||'{}'); }catch(e){ return {}; }
}
function stSetDt(c, val){ localStorage.setItem('tm_dt_'+c.name, JSON.stringify(val)); }

let feedMethod = null;

function feedToggle(){
  const panel = document.getElementById('feed-panel');

  panel.style.display = open ? 'block' : 'none';

function feedInit(){
  // Populate territory dropdown
  const tsel = document.getElementById('feed-terr');
  if(tsel.options.length <= 1){
    FEED_TERRS.forEach(t=>{
      if(!t.id){ return; } // already have the blank option
      const o = document.createElement('option');
      o.value = t.id;
      o.textContent = t.name + (t.ambience ? ' — ' + t.ambience + (t.ambienceMod>0?' (+'+t.ambienceMod+')':t.ambienceMod<0?' ('+t.ambienceMod+')':'') : '');

function feedSelectMethod(id){
  feedMethod = FEED_METHODS.find(m=>m.id===id);
  document.querySelectorAll('.feed-method-card').forEach(c=>{
    c.classList.toggle('selected', c.dataset.id===id);
  });
  feedBuildPool();
}

function feedGetChar(){
  return stActive.length ? (chars.find(c=>c.name===stActive[0]) || null) : null;
}

function chgFeedMod(d){
  const el=document.getElementById('feed-mod-val');
  if(!el) return;
  const cur=parseInt(el.textContent)||0;
  const next=Math.max(-5,Math.min(5,cur+d));
  el.textContent=next>0?'+'+next:next;
  el.style.color=next>0?'#7EC8A0':next<0?'#E8A0A0':'var(--txt2)';
  feedBuildPool();
}
function feedGetMod(){
  const el=document.getElementById('feed-mod-val');
  if(!el) return 0;
  return parseInt(el.textContent)||0;
}
function feedBuildPool(){
  const c = feedGetChar();
  if(!c || !feedMethod){ 
    document.getElementById('feed-pool-section').style.display='none';
    return;
  }
  const m = feedMethod;

  // Best attribute
  let bestAttrVal = 0, bestAttrName = '';
  m.attrs.forEach(a=>{
    const v = c.attributes[a] || 0;
    if(v > bestAttrVal){ bestAttrVal=v; bestAttrName=a; }
  });

  // Best skill
  let bestSkillVal = 0, bestSkillName = 'none', bestSkillSpec = null;
  m.skills.forEach(s=>{
    const sk = c.skills[s];
    const v = sk ? (sk.dots || sk) : 0;
    if(v > bestSkillVal){ bestSkillVal=v; bestSkillName=s; bestSkillSpec = sk ? sk.spec||null : null; }
  });

  // Territory ambience
  const terrId = document.getElementById('feed-terr').value;
  const terr = FEED_TERRS.find(t=>t.id===terrId) || {ambienceMod:0};
  const ambMod = terr.ambienceMod || 0;

  // Discipline select — populate with valid discs char has
  const dsel = document.getElementById('feed-disc');
  const prevDisc = dsel.value;
  while(dsel.options.length > 1) dsel.remove(1);
  m.discs.forEach(d=>{
    if(c.disciplines && c.disciplines[d]){
      const o = document.createElement('option');
      o.value = d;
      o.textContent = d + ' (' + c.disciplines[d] + ')';
      dsel.appendChild(o);
    }
  });
  if(prevDisc) dsel.value = prevDisc;

  const discName = dsel.value;
  const discVal = (discName && c.disciplines) ? (c.disciplines[discName]||0) : 0;

  const manualMod = feedGetMod();
  const total = Math.max(0, bestAttrVal + bestSkillVal + discVal + manualMod);

  // Breakdown display
  const bd = document.getElementById('feed-breakdown');
  let html = `<span>${bestAttrVal}</span> ${bestAttrName}`;
  html += `<br>+ <span>${bestSkillVal}</span> ${bestSkillName}`;
  if(bestSkillSpec) html += ` <span class="feed-dim">[${bestSkillSpec}]</span>`;
  if(discVal) html += `<br>+ <span>${discVal}</span> ${discName}`;
  if(ambMod !== 0) html += `<br><span style="color:var(--txt3);font-size:10px;">${ambMod>0?'+ ':'− '}<span style="color:var(--txt2);">${Math.abs(ambMod)}</span> Ambience (${terr.ambience}) applied to Vitae</span>`;
  if(manualMod !== 0) html += `<br><span style="color:var(--txt3);font-size:10px;">${manualMod>0?'+ ':'− '}<span style="color:${manualMod>0?'#7EC8A0':'#E8A0A0'};">${Math.abs(manualMod)}</span> Modifier</span>`;
  bd.innerHTML = html;
  document.getElementById('feed-pool-n').textContent = total;
  document.getElementById('feed-pool-section').style.display = 'block';
  document.getElementById('feed-result-section').style.display = 'none';
}

function feedRoll(){
  const poolN = parseInt(document.getElementById('feed-pool-n').textContent) || 0;
  if(poolN <= 0) return;

  // Get ambience mod from selected territory
  const terrId = document.getElementById('feed-terr').value;
  const terr = FEED_TERRS.find(t=>t.id===terrId) || {ambienceMod:0};
  const ambMod = terr.ambienceMod || 0;

  const cols = rollPool(poolN);
  const suc = cntSuc(cols);
  const vessels = suc;
  const safeVitae = Math.max(0, vessels * 2 + ambMod);

  // Dice display
  const diceHtml = cols.map(col=>{
    const all = [col.r, ...col.ch];
    return all.map(d=>`<span class="feed-die${d.s?' fd-s':''}${d.v===1?' fd-1':''}">${d.v}</span>`).join('');
  }).join(' ');

  document.getElementById('feed-result-box').innerHTML = `
    <div class="feed-suc-row">
      <div><div class="feed-suc">${suc}</div><div class="feed-suc-lbl">success${suc!==1?'es':''} — ${poolN} dice</div></div>
    </div>
    <div class="feed-dice-row">${diceHtml}</div>
  `;

  if(vessels === 0 && safeVitae <= 0){
    document.getElementById('feed-vessel-row').innerHTML = `
      <div class="feed-v-lbl" style="padding:12px 14px;">No vessels secured this hunt.</div>
    `;
    document.getElementById('feed-push-row').innerHTML = '';
  } else {
    const baseVitae = vessels * 2;
    const ambLine = ambMod !== 0
      ? `<div style="font-size:10px;color:var(--txt3);margin-top:4px;">Ambience (${terr.ambience}): ${ambMod>0?'+':''}${ambMod} Vitae → <b style="color:var(--txt2);">${safeVitae} safe total</b></div>`
      : '';
    document.getElementById('feed-vessel-row').innerHTML = `
      <div style="padding:12px 14px 8px;">
        <div class="feed-v-num">${vessels}</div>
        <div class="feed-v-lbl">vessel${vessels!==1?'s':''} available &nbsp;·&nbsp; <b>${baseVitae} Vitae</b> safe (2 per vessel)</div>
        ${ambLine}
      </div>
    `;
    // Apply controls
    document.getElementById('feed-push-row').innerHTML = `
      <div class="feed-apply-row">
        <div class="feed-apply-lbl">Apply vitae gained:</div>
        <div class="feed-apply-controls">
          <button class="feed-adj" onclick="feedAdjApply(-1)">−</button>
          <span class="feed-adj-val" id="feed-apply-n">${safeVitae}</span>
          <button class="feed-adj" onclick="feedAdjApply(1)">+</button>
          <span class="feed-apply-cap">(max safe: ${safeVitae})</span>
        </div>
        <button class="feed-apply-btn" onclick="feedApplyVitae(${safeVitae})">Apply to Tracker</button>
        <div class="feed-push-note">Draining beyond ${safeVitae} Vitae risks harm — Humanity check if a vessel is drained to incapacitation.</div>
      </div>
    `;
  }

  document.getElementById('feed-result-section').style.display = 'block';
}

function feedAdjApply(d){
  const el = document.getElementById('feed-apply-n');
  if(!el) return;
  const cur = parseInt(el.textContent) || 0;
  el.textContent = Math.max(0, cur + d);
}

function feedApplyVitae(safeMax){
  const c = feedGetChar();
  if(!c) return;
  const n = parseInt(document.getElementById('feed-apply-n').textContent) || 0;
  if(n === 0){ toast('0 vitae — nothing to apply'); return; }
  const cur = stGetTracker(c);
  const maxV = stMaxVitae(c);
  const newV = Math.min(maxV, cur.vitae + n);
  const gained = newV - cur.vitae;
  cur.vitae = newV;
  stSetTracker(c, cur);
  // Update live tracker if character is open in ST overview
  const slug = c.name.replace(/[^a-z0-9]/gi,'');
  const el = document.getElementById('stv-v-'+slug);
  if(el) el.textContent = newV;
  const over = n > safeMax ? ' ⚠ Humanity check required' : '';
  toast(c.name + ': +' + gained + ' Vitae' + (newV >= maxV ? ' (full)' : '') + over);
}

function feedReset(){
  document.getElementById('feed-result-section').style.display = 'none';
  document.getElementById('feed-vessel-row').innerHTML = '';
  document.getElementById('feed-push-row').innerHTML = '';
  const modEl=document.getElementById('feed-mod-val');
  if(modEl){modEl.textContent='0';modEl.style.color='var(--txt2)';}
  feedBuildPool();
}

function stResetAll(){
  const targets = stActive.length ? stActive.map(n=>chars.find(c=>c.name===n)).filter(Boolean) : chars;
  targets.forEach(c=>{
    stSetTracker(c, { vitae:0, wp:stMaxWP(c), inf:stMaxInf(c) });
  });
  toast('All trackers reset');
  renderStOverview();
}

function stApplyDowntime(){
  const targets = stActive.length ? stActive.map(n=>chars.find(c=>c.name===n)).filter(Boolean) : chars;
  let changed=0;
  targets.forEach(c=>{
    const dt=stGetDt(c);
    if(!dt.wp&&!dt.vitae&&!dt.inf) return;
    const cur=stGetTracker(c);
    const maxV=stMaxVitae(c), maxWP=stMaxWP(c), maxInf=stMaxInf(c);
    if(dt.wp)   cur.wp   = Math.max(0, Math.min(maxWP,  cur.wp   - (parseInt(dt.wp)||0)));
    if(dt.vitae)cur.vitae= Math.max(0, Math.min(maxV,   cur.vitae- (parseInt(dt.vitae)||0)));
    if(dt.inf)  cur.inf  = Math.max(0, Math.min(maxInf, cur.inf  - (parseInt(dt.inf)||0)));
    stSetTracker(c, cur);
    stSetDt(c, {});
    changed++;
  });
  toast(changed ? 'Downtime applied & cleared' : 'No downtime logged');
  renderStOverview();
}

function renderPrestige(){
  const el=document.getElementById('st-prestige');
  if(!el||!chars.length) return;

  el.innerHTML=`<div class="prestige-board">

      <div class="prestige-row" style="padding:4px 12px">

function handleImport(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:false});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
      if(!rows||rows.length<2){toast('Import failed: no data rows');return;}
      const parsed=parseExcelToChars(rows);
      if(!parsed.length){toast('Import failed: no characters found');return;}
      localStorage.setItem('tm_import_chars',JSON.stringify(parsed));
      const now=new Date();
      const dateStr=now.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
      localStorage.setItem('tm_import_meta',JSON.stringify({filename:file.name,count:parsed.length,date:dateStr}));
      loadChars();
      renderStOverview();
      toast(`Imported ${parsed.length} characters from ${file.name}`);
    }catch(err){
      console.error('Import error',err);
      toast('Import failed: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

function handleDtImport(input){
  const file=input.files[0];
  if(!file) return;
  toast('Downtime import: coming soon');
  input.value='';
}

function parseExcelToChars(rows){
  const hdrs=rows[0];
  const h={};
  hdrs.forEach((v,i)=>{if(v) h[String(v).trim()]=i;});

  const NULL_VALS=new Set([null,undefined,'','-','¬','~']);
  function isNull(v){return NULL_VALS.has(v)||(typeof v==='string'&&v.trim()==='')||v==='○';}
  function clean(v){return(isNull(v))?null:String(v).trim();}

  // Count ● for integer value; count ○ for bonus; † for nine-again
  function parseDotStr(v){
    const s=clean(v);
    if(!s||s==='-'||s==='¬'||s==='~'||s==='○') return null;
    const base=(s.match(/●/g)||[]).length;
    const bonus=(s.match(/○/g)||[]).length;
    const nineAgain=s.includes('†');
    return{base,bonus,nineAgain};
  }
  function dotInt(v){const d=parseDotStr(v);return d?d.base:0;}

  // Return skill value: int if simple, object if has bonus/spec/nine_again
  function skillVal(dotCol,specCol,row){
    const raw=row[dotCol];
    const spec=clean(row[specCol]);
    const d=parseDotStr(raw);
    const base=d?d.base:0;
    const bonus=d?d.bonus:0;
    const na=d?d.nineAgain:false;
    if(!base&&!spec) return null; // no dots, no spec → skip
    if(!bonus&&!na&&!spec) return base; // simple integer
    const o={dots:base};
    if(bonus) o.bonus_dots=bonus;
    if(na) o.nine_again=true;
    if(spec) o.spec=spec;
    return o;
  }

  // Attribute: may have bonus dots (○)
  function attrVal(col,row){
    const d=parseDotStr(row[col]);
    if(!d) return 0;
    if(!d.bonus) return d.base;
    return{dots:d.base,bonus_dots:d.bonus};
  }

  // Parse covenant status dot string → integer
  function covStatus(v){
    const s=clean(v);
    if(!s||s==='-') return 0;
    return(s.match(/●/g)||[]).length;
  }

  // Parse touchstone: "● (Name (desc))" or "● (Name)"
  function parseTouchstone(v,humanity){
    const s=clean(v);
    if(!s||!s.includes('(')) return null;
    // Strip leading "● (" and trailing ")"
    const content=s.replace(/^●\s*\(/,'').replace(/\)$/,'');
    const inner=content.match(/^(.+?)\s*\((.+)\)$/);
    if(inner) return{humanity,name:inner[1].trim(),desc:inner[2].trim()};
    return{humanity,name:content.trim(),desc:null};
  }

  // Parse influence total "8 / 8" → integer (max)
  function parseInflTotal(v){
    const s=clean(v);
    if(!s) return 0;
    const parts=s.split('/');
    return parseInt(parts[parts.length-1])||0;
  }

  const ATTR_NAMES=['Intelligence','Wits','Resolve','Strength','Dexterity','Stamina','Presence','Manipulation','Composure'];
  const SKILL_PAIRS=[
    ['Academics','Academics Spec'],['Computer','Computer Spec'],['Crafts','Crafts Spec'],
    ['Investigation','Investigation Spec'],['Medicine','Medicine Spec'],['Occult','Occult Spec'],
    ['Politics','Politics Spec'],['Science','Science Spec'],
    ['Athletics','Athletics Spec'],['Brawl','Brawl Spec'],['Drive','Drive Spec'],
    ['Firearms','Firearms Spec'],['Larceny','Larceny Spec'],['Stealth','Stealth Spec'],
    ['Survival','Survival Spec'],['Weaponry','Weaponry Spec'],
    ['Animal Ken','Animal Ken Spec'],['Empathy','Empathy Spec'],['Expression','Expression Spec'],
    ['Intimidation','Intimidation Spec'],['Persuasion','Persuasion Spec'],
    ['Socialise','Socialise Spec'],['Streetwise','Streetwise Spec'],['Subterfuge','Subterfuge Spec'],
  ];
  const DISC_NAMES=['Animalism','Auspex','Celerity','Dominate','Majesty','Nightmare','Obfuscate','Protean','Resilience','Vigour','Cruac','Theban','Creation','Destruction','Divination','Protection','Transmutation'];

  const result=[];
  for(let ri=1;ri<rows.length;ri++){
    const row=rows[ri];
    const name=clean(row[h['Character Name']]);
    if(!name) continue;

    // Attributes
    const attributes={};
    ATTR_NAMES.forEach(a=>{const v=attrVal(h[a],row);if(v) attributes[a]=v;});

    // Skills
    const skills={};
    SKILL_PAIRS.forEach(([sk,sp])=>{
      const v=skillVal(h[sk],h[sp],row);
      if(v!==null) skills[sk]=v;
    });

    // Disciplines
    const disciplines={};
    DISC_NAMES.forEach(d=>{const n=dotInt(row[h[d]]);if(n>0) disciplines[d]=n;});

    // Powers (Blood 1-30)
    const powers=[];
    for(let i=1;i<=30;i++){
      const name_p=clean(row[h[`Blood ${i}`]]);
      if(!name_p) continue;
      const stats=clean(row[h[`Blood Stats ${i}`]]);
      const effect=clean(row[h[`Blood Effect ${i}`]]);
      const p={name:name_p};
      // Extract pool_size from stats string
      if(stats){
        const pm=stats.match(/Pool:\s*(\d+)/);
        if(pm) p.pool_size=parseInt(pm[1]);
        p.stats=stats;
      }
      if(effect) p.effect=effect;
      powers.push(p);
    }

    // Merits
    const merits=[];
    for(let i=1;i<=30;i++){
      const m=clean(row[h[`Merit ${i}`]]);
      if(m&&m!=='¬') merits.push(m);
    }

    // Influence
    const influence=[];
    for(let i=1;i<=20;i++){
      const type=clean(row[h[`Influence ${i}`]]);
      const area=clean(row[h[`Area ${i}`]]);
      const dots=dotInt(row[h[`Influence Dots ${i}`]]);
      if(type&&!isNull(row[h[`Influence ${i}`]])) influence.push({type,area:area||'',dots});
    }

    // Touchstones (col Humanity 10..1 → humanity values 10..1)
    const touchstones=[];
    for(let hv=10;hv>=1;hv--){
      const ts=parseTouchstone(row[h[`Humanity ${hv}`]],hv);
      if(ts) touchstones.push(ts);
    }

    // Banes
    const baneNames=['Clan Bane','Bloodline Bane','Other Bane 1','Other Bane 2','Other Bane 3'];
    const baneEffCols=['Clan Bane Effect','Bloodline Bane Effect','Other Bane Effect 1','Other Bane Effect 2','Other Bane Effect 3'];
    const banes=[];
    baneNames.forEach((bn,i)=>{
      const n=clean(row[h[bn]]);const e=clean(row[h[baneEffCols[i]]]);
      if(n&&n!=='¬') banes.push({name:n,effect:e||''});
    });

    // Covenant standings
    const covenant_standings=[];
    for(let i=1;i<=4;i++){
      const label=clean(row[h[`Covenant ${i}`]]);
      const status=covStatus(row[h[`Covenant Status ${i}`]]);
      if(label&&label!=='¬') covenant_standings.push({label,status});
    }

    // Domain
    const domKeys=['Safe Place','Haven','Feeding Grounds','Herd'];
    const domJS=['safe_place','haven','feeding_grounds','herd'];
    const domain={};
    domKeys.forEach((k,i)=>{const n=dotInt(row[h[k]]);if(n>0) domain[domJS[i]]=n;});

    // Standing
    const mcDots=dotInt(row[h['Mystery Cult Initiation']]);
    const mcName=clean(row[h['Mystery Cult Name']]);
    const ptDots=dotInt(row[h['Professional Training']]);
    const ptRole=clean(row[h['Prof Training Role']]);
    const standing={};
    if(mcDots>0||mcName) standing.mystery_cult={dots:mcDots,name:mcName||''};
    if(ptDots>0||ptRole) standing.prof_training={dots:ptDots,role:ptRole||''};

    // Aspirations
    const aspirations=[];
    for(let i=1;i<=3;i++){const a=clean(row[h[`Aspiration ${i}`]]);if(a) aspirations.push(a);}

    const char={
      name,
      player:clean(row[h['Player Name']]),
      clan:clean(row[h['Clan']]),
      bloodline:(()=>{const b=clean(row[h['Bloodline']]);return(b&&b!=='¬')?b:null;})(),
      covenant:clean(row[h['Covenant']]),
      concept:(()=>{const c=clean(row[h['Concept']]);return(c&&c!=='¬')?c:null;})(),
      pronouns:clean(row[h['Pronouns']]),
      mask:clean(row[h['Mask']]),
      dirge:clean(row[h['Dirge']]),
      court_title:(()=>{const ct=clean(row[h['Court Title']]);return(ct&&ct!=='¬')?ct:null;})(),
      apparent_age:(()=>{const aa=clean(row[h['Apparent Age']]);return(aa&&aa!=='¬')?aa:null;})(),
      blood_potency:dotInt(row[h['Blood Potency']]),
      humanity:parseInt(row[h['Hum']])||0,
      size:parseInt(row[h['Size']])||5,
      speed:parseInt(row[h['Speed']])||0,
      defence:parseInt(row[h['Defence']])||0,
      xp_total:parseInt(row[h['XP Total']])||0,
      xp_left:parseInt(row[h['XP Left']])||0,
      status:{
        city:parseInt(row[h['City Status']])||0,
        clan:parseInt(row[h['Clan Status']])||0,
        covenant:parseInt(row[h['Covenant Status']])||0,
      },
      attributes,skills,disciplines,powers,merits,influence,
      influence_total:parseInflTotal(row[h['Influence']]),
      touchstones,banes,aspirations,covenant_standings,
      domain:Object.keys(domain).length?domain:undefined,
      standing:Object.keys(standing).length?standing:undefined,
      features:(()=>{const f=clean(row[h['Features']]);return(f&&f!=='¬')?f:null;})(),
      willpower:{
        mask_1wp:clean(row[h['Mask 1WP']]),
        mask_all_wp:clean(row[h['Mask AllWP']]),
        dirge_1wp:clean(row[h['Dirge 1WP']]),
        dirge_all_wp:clean(row[h['Dirge AllWP']]),
      },
    };
    // Clean undefined keys
    if(!char.domain) delete char.domain;
    if(!char.standing) delete char.standing;
    result.push(char);
  }
  return result;
}

updPool();
loadChars();
</script>
