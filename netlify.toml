[build]
  publish = "public"

# Proxy API requests to the Render-hosted Express server.
# Update the 'to' URL when the Render service is deployed.
[[redirects]]
  from = "/api/*"
  to = "https://tm-suite-api.onrender.com/api/:splat"
  status = 200
  force = true

# Block dev-login in production — only meaningful locally
[[redirects]]
  from = "/dev-login"
  to = "/dev-login.html"
  status = 404

# Named entry points — serve the correct HTML for each app
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/player"
  to = "/player.html"
  status = 200

# SPA fallback — serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
