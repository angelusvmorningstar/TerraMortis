name: API Tests

# Disabled: tests require seeded v3 schema data in tm_suite_test (Atlas).
# The migrate.js seeds v2 data; migrate-schema-v3.js must run after.
# Re-enable once a CI seed script chains both steps.
# See: PP.9 (schema v3), PP.10 (client migration)
on:
  workflow_dispatch:  # manual trigger only until CI seeding is fixed
  # push:
  #   branches: [main, dev]
  # pull_request:
  #   branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: tm_suite_test
          DISCORD_CLIENT_ID: placeholder
          DISCORD_CLIENT_SECRET: placeholder
          SESSION_SECRET: placeholder-ci-secret
        run: |
          # Strip ssl= param — not accepted by MongoDB driver v7
          CLEAN_URI=$(echo "$MONGODB_URI" | sed 's/[&?]ssl=[^&]*//')
          MONGODB_URI="$CLEAN_URI" npm test
